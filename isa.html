<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>정보과학 16개 코드 진위형 5지선다 평가</title>
<style>
:root{
  --bg:#f3f7ff;--card:#ffffff;--ink:#172033;--muted:#64748b;--main:#2563eb;
  --main2:#06b6d4;--soft:#eaf2ff;--line:#dbe7f6;--good:#16a34a;--bad:#dc2626;
  --warn:#f59e0b;--code:#111827;--code2:#e5e7eb;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:
 radial-gradient(circle at top left,rgba(37,99,235,.12),transparent 32rem),
 radial-gradient(circle at top right,rgba(6,182,212,.15),transparent 30rem),
 var(--bg); color:var(--ink); font-family:Arial,'Malgun Gothic',sans-serif; line-height:1.65}
header{position:relative;overflow:hidden;background:linear-gradient(135deg,#1d4ed8,#06b6d4);color:white;padding:34px 20px 44px}
.wrap{max-width:1280px;margin:0 auto;padding:0 18px}
.badge{display:inline-flex;gap:8px;align-items:center;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);padding:7px 13px;border-radius:999px;font-weight:700}
h1{font-size:34px;margin:14px 0 8px;letter-spacing:-1px}
.lead{max-width:900px;font-size:17px;opacity:.95;margin:0}
.panel{background:rgba(255,255,255,.86);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:22px;padding:20px;margin-top:-28px;position:relative;box-shadow:0 18px 45px rgba(15,23,42,.12)}
.infoGrid{display:grid;grid-template-columns:1fr 1fr auto auto;gap:12px;align-items:end}
label{font-weight:800;color:#334155;font-size:14px}
input[type=text]{width:100%;margin-top:6px;border:1px solid #cbd5e1;border-radius:14px;padding:13px 14px;font-size:16px;background:white}
button{border:0;border-radius:14px;padding:13px 16px;font-weight:900;cursor:pointer;transition:.2s;white-space:nowrap}
.primary{background:linear-gradient(135deg,var(--main),var(--main2));color:white;box-shadow:0 10px 20px rgba(37,99,235,.22)}
.secondary{background:#eef2ff;color:#1e3a8a;border:1px solid #c7d2fe}
button:hover{transform:translateY(-1px)}
.status{margin-top:14px;display:flex;flex-wrap:wrap;gap:10px;color:#475569}
.chip{display:inline-flex;align-items:center;gap:6px;background:#f8fafc;border:1px solid var(--line);padding:7px 10px;border-radius:999px;font-size:13px}
.toc{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin:22px 0}
.toc a{text-decoration:none;color:#1e3a8a;background:white;border:1px solid var(--line);padding:10px 12px;border-radius:14px;font-size:14px;font-weight:800;box-shadow:0 6px 16px rgba(15,23,42,.04)}
.card{background:var(--card);border:1px solid var(--line);border-radius:24px;margin:24px 0;padding:22px;box-shadow:0 12px 34px rgba(15,23,42,.07);overflow:hidden}
.cardHead{display:flex;gap:12px;align-items:center;margin-bottom:14px}
.num{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,var(--main),var(--main2));color:white;font-weight:900}
.card h2{font-size:22px;letter-spacing:-.4px;margin:0}
.meta{color:var(--muted);font-size:13px;margin-top:3px}
.codeBox{position:relative;margin:14px 0}
.copy{position:absolute;right:12px;top:12px;padding:7px 10px;border-radius:10px;font-size:12px;background:#334155;color:white;opacity:.9}
pre{margin:0;background:var(--code);color:var(--code2);border-radius:18px;padding:18px;overflow:auto;font-size:14px;line-height:1.55;border:1px solid #334155}
code{font-family:Consolas,'D2Coding','Courier New',monospace}
.quizBox{background:linear-gradient(180deg,#f8fbff,#ffffff);border:1px solid var(--line);border-radius:20px;padding:18px;margin-top:14px}
.qTitle{font-weight:900;color:#0f172a;margin-bottom:12px}
.options{display:grid;gap:10px}
.option{display:flex;gap:10px;align-items:flex-start;background:white;border:1px solid #dbe7f6;border-radius:15px;padding:12px 13px;cursor:pointer;transition:.15s}
.option:hover{border-color:#93c5fd;background:#f8fbff}
.option input{margin-top:4px;transform:scale(1.1)}
.optionText{flex:1}
.feedback{display:none;margin-top:14px;border-radius:16px;padding:14px;border:1px solid var(--line);background:#f8fafc}
.feedback.good{border-color:#bbf7d0;background:#f0fdf4}
.feedback.bad{border-color:#fecaca;background:#fff7f7}
.explain{margin-top:8px;color:#334155}
.correctList{font-weight:800}
.resultBox{display:none;background:white;border:2px solid #bfdbfe;border-radius:24px;padding:22px;margin:24px 0;box-shadow:0 16px 38px rgba(37,99,235,.12)}
.scoreBig{font-size:38px;font-weight:1000;color:#1d4ed8;margin:4px 0}
.warning{color:#b45309;font-weight:800;margin-top:8px}
.footer{color:#64748b;text-align:center;padding:30px 0 40px}
@media(max-width:860px){
  .infoGrid{grid-template-columns:1fr}
  h1{font-size:28px}
  .card{padding:16px}
}
@media print{
  .panel button,.copy{display:none}
  body{background:white}
  .card{break-inside:avoid;box-shadow:none}
}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="badge">📘 정보과학 · 코드 이해 평가</div>
    <h1>16개 코드 진위형 5지선다 문제</h1>
    <p class="lead">각 문항은 <b>전체 코드</b>를 먼저 읽고, 보기 5개 중 <b>옳은 설명 3개</b>를 고르는 방식입니다. 제출하면 점수, 정오답, 상세 설명이 표시되고 TXT 파일로 저장할 수 있습니다.</p>
  </div>
</header>

<main class="wrap">
  <section class="panel">
    <div class="infoGrid">
      <div>
        <label for="studentId">학번</label>
        <input id="studentId" type="text" placeholder="예: 1101">
      </div>
      <div>
        <label for="studentName">이름</label>
        <input id="studentName" type="text" placeholder="예: 홍길동">
      </div>
      <button class="primary" onclick="gradeQuiz()">제출 및 채점</button>
      <button class="secondary" onclick="downloadTxt()">TXT 저장</button>
    </div>
    <div class="status">
      <span class="chip">✅ 총 16문항</span>
      <span class="chip">☑️ 문항마다 정답 3개</span>
      <span class="chip">📄 파일명: 학번_이름_점수_정보과학_응시시각.txt</span>
    </div>
    <div id="globalWarn" class="warning"></div>
  </section>

  <section id="resultBox" class="resultBox">
    <h2>채점 결과</h2>
    <div id="scoreBig" class="scoreBig">0점</div>
    <div id="scoreDetail"></div>
  </section>

  <nav class="toc" id="toc"></nav>
  <section id="cards"></section>
  <div class="footer">코드를 먼저 읽고 보기의 참·거짓을 판단하는 정보과학 학습용 HTML</div>
</main>

<script>
const quizData = [{"num": 1, "title": "활동 1: 게임 플레이어와 남은 게임 수 확인", "code": "def turnA(left):\n    if left == 0:\n        print('게임 종료')\n        return\n    print('A의 턴: 남은 게임 수', left)\n    turnB(left - 1)\n\ndef turnB(left):\n    if left == 0:\n        print('게임 종료')\n        return\n    print('B의 턴: 남은 게임 수', left)\n    turnA(left - 1)\n\ntotal = 6\nturnA(total)", "question": "다음 중 이 코드에 대한 설명으로 옳은 것을 모두 고르세요.", "options": ["left가 0이면 '게임 종료'를 출력하고 재귀 호출을 멈춘다.", "turnA는 turnB를 호출하고, turnB는 turnA를 호출하는 간접 재귀 구조이다.", "각 턴이 진행될 때 left 값은 1씩 감소한다.", "total이 6이면 처음 출력되는 턴은 B의 턴이다.", "종료 조건이 없어도 파이썬이 자동으로 재귀를 멈춘다."], "answer": [0, 1, 2], "explanation": "이 코드는 A와 B가 번갈아 호출되는 간접 재귀이다. left가 0이 되면 return으로 종료하며, 호출할 때마다 left - 1을 넘겨 남은 게임 수를 줄인다."}, {"num": 2, "title": "활동 1 응용: n명 플레이어 턴 진행", "code": "def turnGame(left, number):\n    if left == 0:\n        print('game over')\n        return\n    number = number % len(player)\n    print(player[number], '의 턴: 남은 게임 수', left)\n    turnGame(left - 1, number + 1)\n\nplayer = ['A', 'B', 'C', 'D']\nnumber = 0\ntotal = 6\nturnGame(total, number)", "question": "다음 중 이 코드에 대한 설명으로 옳은 것을 모두 고르세요.", "options": ["number % len(player)는 플레이어 인덱스를 순환시키는 역할을 한다.", "player 리스트의 길이가 바뀌어도 순환 기준이 함께 바뀐다.", "turnGame은 남은 게임 수가 0이 될 때까지 자기 자신을 다시 호출한다.", "number는 항상 0으로 고정되어 A만 출력된다.", "total 값은 플레이어 수와 반드시 같아야 한다."], "answer": [0, 1, 2], "explanation": "나머지 연산으로 number가 리스트 범위를 벗어나지 않게 하며, 재귀 호출마다 left는 줄고 number는 증가한다."}, {"num": 3, "title": "활동 2: 단어 퍼즐 게임", "code": "import random\n\nwords = ['python', 'programming', 'science', 'education', 'computer']\nword = random.choice(words)\nhint = list(word)\n\nfor i in range(len(hint) // 2):\n    hint[random.randint(0, len(hint) - 1)] = '_'\n\nprint('단어 퍼즐 게임에 오신 것을 환영합니다!')\nprint('힌트:', ''.join(hint))\nprint('기회는 5번입니다.')\n\nfor attempt in range(5):\n    guess = input(f'({attempt + 1}/5) 단어를 추측해 보세요: ')\n    if guess == word:\n        print('정답입니다!')\n        break\n    else:\n        print('틀렸습니다.')\nelse:\n    print(f'실패! 정답은 {word}입니다.')", "question": "다음 중 이 코드에 대한 설명으로 옳은 것을 모두 고르세요.", "options": ["random.choice(words)는 단어 리스트에서 임의의 단어 하나를 고른다.", "list(word)는 문자열을 글자 단위 리스트로 바꾸어 일부 글자를 수정할 수 있게 한다.", "for-else 구조에서 break가 한 번도 실행되지 않으면 else가 실행된다.", "guess가 word와 달라도 항상 '정답입니다!'가 출력된다.", "hint는 항상 원래 단어와 완전히 같은 문자열로 출력된다."], "answer": [0, 1, 2], "explanation": "선택된 단어를 리스트로 바꾸어 일부 문자를 '_'로 바꾸고, 사용자가 정답을 맞히면 break로 반복을 종료한다. 5번 모두 실패하면 for-else의 else가 실행된다."}, {"num": 4, "title": "활동 3: 콜라츠 추측과 우박수열", "code": "def collatz(n):\n    print(n, end=' ')\n    if n == 1:\n        return\n    elif n % 2 == 0:\n        collatz(n // 2)\n    else:\n        collatz(3 * n + 1)\n\nstart = int(input('자연수를 입력하세요: '))\nprint('콜라츠 추측에 의한 우박수열:', end=' ')\ncollatz(start)", "question": "다음 중 이 코드에 대한 설명으로 옳은 것을 모두 고르세요.", "options": ["n이 1이면 재귀 호출을 종료한다.", "n이 짝수이면 n // 2를 다음 값으로 사용한다.", "n이 홀수이면 3 * n + 1을 다음 값으로 사용한다.", "짝수일 때도 3 * n + 1을 계산한다.", "print(n, end=' ')는 매번 줄을 바꾸어 출력한다."], "answer": [0, 1, 2], "explanation": "콜라츠 규칙은 짝수는 2로 나누고 홀수는 3을 곱한 뒤 1을 더하는 것이다. n == 1이 종료 조건이다."}, {"num": 5, "title": "활동 3 응용: 우박수열 길이", "code": "def collatz_length(n):\n    if n == 1:\n        return 1\n    elif n % 2 == 0:\n        return 1 + collatz_length(n // 2)\n    else:\n        return 1 + collatz_length(3 * n + 1)\n\nstart = int(input('자연수를 입력하세요: '))\nprint('우박수열의 길이:', collatz_length(start))", "question": "다음 중 이 코드에 대한 설명으로 옳은 것을 모두 고르세요.", "options": ["n이 1이면 길이 1을 반환한다.", "재귀 호출 결과에 1을 더해 현재 항까지 포함한 길이를 계산한다.", "짝수와 홀수에 따라 다음 재귀 호출 값이 다르다.", "이 함수는 우박수열의 값들을 화면에 모두 출력한다.", "return 없이 print만 사용해 길이를 계산한다."], "answer": [0, 1, 2], "explanation": "collatz_length는 출력용 함수가 아니라 길이를 반환하는 함수이다. 각 단계마다 현재 항 1개를 더하고 다음 항의 길이를 재귀적으로 구한다."}, {"num": 6, "title": "활동 4: 지도 색칠 문제", "code": "def solve(v, c):\n    for i in range(n):\n        if am[v][i] > 0 and visited[i] == c:\n            return\n    visited[v] = c\n    for i in range(n):\n        if am[v][i] > 0 and visited[i] == 0:\n ser = BrowserHistory('google.com')\nbrowser.visit('naver.com')\nbrowser.visit('youtube.com')\nbrowser.go_back()", "question": "다음 중 이 코드에 대한 설명으로 옳은 것을 모두 고르세요.", "options": ["visit을 실행하면 현재 페이지가 back_stack에 저장된다.", "새 페이지를 방문하면 forward_stack은 새 Stack으로 초기화된다.", "go_back은 현재 페이지를 forward_stack에 넣고 back_stack에서 이전 페이지를 꺼낸다.", "스택은 먼저 들어간 데이터가 먼저 나오는 FIFO 구조이다.", "go_forward는 back_stack이 비어 있을 때만 실행된다."], "answer": [0, 1, 2], "explanation": "브라우저 방문 기록은 LIFO 스택으로 구현한다. 뒤로 가기는 현재 페이지를 앞으로 가기 스택에 저장한 뒤, 뒤로 가기 스택에서 이전 페이지를 꺼낸다."}, {"num": 8, "title": "정답: 플레이리스트 함수", "code": "playlist = []\nplaylist_name = 'My Playlist'\n\ndef add_song(song):\n    playlist.append(song)\n    print(f\"'{song}'이(가) '{playlist_name}'에 추가되었습니다.\")\n\ndef remove_song(song):\n    if song in playlist:\n        playlist.remove(song)\n        print(f\"'{song}'이(가) '{playlist_name}'에서 제거되었습니다.\")\n    else:\n        print(f\"'{song}'은(는) '{playlist_name}'에 없습니다.\")\n\ndef reset_playlist():\n    global playlist\n    playlist = []\n    print(f\"'{playlist_name}'이(가) 초기화되었습니다.\")\n\ndef show_playlist():\n    if not playlist:\n        print(f\"'{playlist_name}'이(가) 비어 있습니다.\")\n    else:\n        print(f\"현재 '{playlist_name}'의 노래:\")\n        for index, song in enumerate(playlist, 1):\n            print(f'{index}. {song}')\n\ndef print_song_count():\n    print(f\"'{playlist_name}'의 현재 곡 수: {len(playlist)}\")", "question": "다음 중 이 코드에 대한 설명으로 옳은 것을 모두 고르세요.", "options": ["add_song은 playlist에 노래를 추가한다.", "remove_song은 노래가 있을 때만 삭제하고, 없으면 안내 메시지를 출력한다.", "reset_playlist는 전역 playlist를 새 빈 리스트로 바꾸므로 global을 사용한다.", "show_playlist는 playlist가 비어 있어도 무조건 곡 목록을 출력한다.", "print_song_count는 playlist_name의 글자 수를 출력한다."], "answer": [0, 1, 2], "explanation": "플레이리스트 기능을 함수별로 분리했다. reset_playlist는 전역 변수 playlist 자체를 다시 대입하므로 global 선언이 필요하다."}, {"num": 9, "title": "정답: 가위바위보 게임", "code": "import random\n\nscore = 0\n\ndef get_user_input():\n    return input('가위, 바위, 보를 입력하세요: ').strip()\n\ndef get_computer_input():\n function esc(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function render(){
  const toc = document.getElementById('toc');
  const cards = document.getElementById('cards');
  toc.innerHTML = quizData.map((q,i)=>`<a href="#q${i+1}">${String(i+1).padStart(2,'0')}. ${esc(q.title)}</a>`).join('');
  cards.innerHTML = quizData.map((q,i)=>{
    const opts = q.options.map((op,j)=>`
      <label class="option" id="opt-${i}-${j}">
        <input type="checkbox" name="q${i}" value="${j}" onchange="limitCheck(${i})">
        <span class="optionText"><b>${String.fromCharCode(9312+j)}</b> ${esc(op)}</span>
      </label>`).join('');
    return `
      <article class="card" id="q${i+1}">
        <div class="cardHead">
          <div class="num">${String(i+1).padStart(2,'0')}</div>
          <div>
            <h2>${esc(q.title)}</h2>
            <div class="meta">전체 코드 확인 후 옳은 것 3개 고르기</div>
          </div>
        </div>
        <div class="codeBox">
          <button class="copy" onclick="copyCode(${i})">코드 복사</button>
          <pre><code id="code-${i}">${esc(q.code)}</code></pre>
        </div>
        <div class="quizBox">
          <div class="qTitle">${esc(q.question)}</div>
          <div class="options">${opts}</div>
          <div class="feedback" id="fb-${i}"></div>
        </div>
      </article>`;
  }).join('');
}

function limitCheck(i){
  const checked = [...document.querySelectorAll(`input[name="q${i}"]:checked`)];
  if(checked.length > 3){
    checked[checked.length-1].checked = false;
    alert('이 문항은 옳은 것 3개만 선택합니다.');
  }
}

function selectedOf(i){
  return [...document.querySelectorAll(`input[name="q${i}"]:checked`)].map(x=>Number(x.value)).sort((a,b)=>a-b);
}

function sameArray(a,b){
  return a.length === b.length && a.every((v,i)=>v===b[i]);
}

function gradeQuiz(){
  const sid = document.getElementById('studentId').value.trim();
  const name = document.getElementById('studentName').value.trim();
  const warn = document.getElementById('globalWarn');
  warn.textContent = '';
  if(!sid || !name){
    warn.textContent = '학번과 이름을 먼저 입력해 주세요.';
    return;
  }
  let incomplete = [];
  let correctCount = 0;
  const details = [];
  quizData.forEach((q,i)=>{
    const sel = selectedOf(i);
    if(sel.length !== 3) incomplete.push(i+1);
  });
  if(incomplete.length){
    warn.textContent = '각 문항마다 3개씩 선택해야 합니다. 미완료 문항: ' + incomplete.join(', ');
    return;
  }

  quizData.forEach((q,i)=>{
    const sel = selectedOf(i);
    const ans = [...q.answer].sort((a,b)=>a-b);
    const ok = sameArray(sel, ans);

    const fb = document.getElementById(`fb-${i}`);
    fb.style.display = 'block';
    fb.className = 'feedback ' + (ok ? 'good' : 'bad');

    q.options.forEach((_,j)=>{
      const el = document.getElementById(`opt-${i}-${j}`);
      el.style.borderColor = '#dbe7f6';
      el.style.background = 'white';
      if(ans.includes(j)){
        el.style.borderColor = '#86efac';
        el.style.background = '#f0fdf4';
      }
      if(sel.includes(j) && !ans.includes(j)){
        el.style.borderColor = '#fca5a5';
        el.style.background = '#fff1f2';
      }
    });

    const ansText = ans.map(j=>String.fromCharCode(9312+j)).join(', ');
    const selText = sel.map(j=>String.fromCharCode(9312+j)).join(', ');
    fb.innerHTML = `
      <div><b>${ok ? '정답입니다.' : '오답입니다.'}</b></div>
      <div class="correctList">선택: ${selText} / 정답: ${ansText}</div>
      <div class="explain">${esc(q.explanation)}</div>
    `;
    details.push({num:i+1,title:q.title,selected:sel,answer:ans,correct:ok,explanation:q.explanation});
  });

  const score = Math.round(correctCount / quizData.length * 100);
  const endTime = new Date();
  lastResult = {sid,name,score,correctCount,total:quizData.length,startTime,endTime,details};
  submitted = true;
  document.getElementById('resultBox').style.display = 'block';
  document.getElementById('scoreBig').textContent = `${score}점`;
  document.getElementById('scoreDetail').innerHTML = `
    <b>${esc(sid)} ${esc(name)}</b> · 정답 ${correctCount} / ${quizData.length}문항 · 제출 시각: ${formatDate(endTime)}<br>
    아래 각 카드에서 정오답과 상세 설명을 확인하세요.
  `;
  document.getElementById('resultBox').scrollIntoView({behavior:'smooth',block:'center'});
}

function formatDate(d){
  const z = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())} ${z(d.getHours())}:${z(d.getMinutes())}:${z(d.getSeconds())}`;
}
function fileDate(d){
  const z = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}${z(d.getMonth()+1)}${z(d.getDate())}_${z(d.getHours())}${z(d.getMinutes())}${z(d.getSeconds())}`;
}
function numList(arr){ return arr.map(j=>String.fromCharCode(9312+j)).join(', '); }

function makeTxt(){
  if(!submitted || !lastResult) return null;
  let lines = [];
  lines.push('정보과학 16개 코드 진위형 5지선다 평가 결과');
  lines.push('='.repeat(60));
  lines.push(`학번: ${lastResult.sid}`);
  lines.push(`이름: ${lastResult.name}`);
  lines.push(`점수: ${lastResult.score}점`);
  lines.push(`정답 문항: ${lastResult.correctCount} / ${lastResult.total}`);
  lines.push(`시작 시각: ${formatDate(lastResult.startTime)}`);
  lines.push(`제출 시각: ${formatDate(lastResult.endTime)}`);
  lines.push('');
  quizData.forEach((q,i)=>{
    const d = lastResult.details[i];
    lines.push(`[${String(i+1).padStart(2,'0')}] ${q.title}`);
    lines.push(`정오답: ${d.correct ? '정답' : '오답'}`);
    lines.push(`선택: ${numList(d.selected)}`);
    lines.push(`정답: ${numList(d.answer)}`);
    lines.push('보기:');
    q.options.forEach((op,j)=> lines.push(`  ${String.fromCharCode(9312+j)} ${op}`));
    lines.push(`상세 설명: ${d.explanation}`);
    lines.push('-'.repeat(60));
  });
  return lines.join('\n');
}

function downloadTxt(){
  if(!submitted){
    alert('먼저 제출 및 채점을 해 주세요.');
    return;
  }
  const txt = makeTxt();
  const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  const safeSid = lastResult.sid.replace(/[\\/:*?"<>|\s]/g,'_');
  const safeName = lastResult.name.replace(/[\\/:*?"<>|\s]/g,'_');
  a.href = URL.createObjectURL(blob);
  a.download = `${safeSid}_${safeName}_${lastResult.score}점_정보과학_${fileDate(lastResult.endTime)}.txt`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}

function copyCode(i){
  navigator.clipboard.writeText(quizData[i].code);
  alert('코드가 복사되었습니다.');
}

render();
</script>
</body>
</html>
