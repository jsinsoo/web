            ["Don’t stop when you’re tired. Stop when you’re done.", "피곤할 때 멈추지 말고, 끝냈을 때 멈추세요."],
            ["The harder you work for something, the greater you’ll feel when you achieve it.", "무언가를 위해 더 열심히 일할수록, 그것을 이루었을 때 더 큰 성취감을 느낄 것입니다."],
            ["Push yourself, because no one else is going to do it for you.", "스스로를 밀어붙이세요. 아무도 당신을 대신해 그것을 하지 않을 것입니다."]
      
            // 나머지 문장 추가하여 100개까지 확장 가능
        ];

        let index = 0;
        function updateWord() {
            document.getElementById("word").textContent = words[index][0];
            document.getElementById("meaning").textContent = words[index][1];
            index = (index + 1) % words.length;
        }
        setInterval(updateWord, 2000);

        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const date = now.toLocaleDateString('en-US', options);
            const time = now.toLocaleTimeString('en-US', { hour12: true });
            document.getElementById("date").textContent = date;
            document.getElementById("time").textContent = time;
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        function updateQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById("footer").innerHTML = `
                <strong>${quotes[randomIndex][0]}</strong>
                <br>
                <em>${quotes[randomIndex][1]}</em>
            `;
        }
        setInterval(updateQuote, 5000);
        updateQuote();

        const fileInput = document.getElementById("fileInput");
        const playButton = document.getElementById("playButton");
        const pauseButton = document.getElementById("pauseButton");
        const audioPlayer = document.getElementById("audioPlayer");

        fileInput.addEventListener("change", function() {
            const file = fileInput.files[0];
            if (file) {
                const fileURL = URL.createObjectURL(file);
                audioPlayer.src = fileURL;
            } else {
                audioPlayer.src = "";
            }
        });

        playButton.addEventListener("click", function() {
            if (audioPlayer.src) {
                audioPlayer.play();
            }
        });

        pauseButton.addEventListener("click", function() {
            audioPlayer.pause();
        });
    </script>
</body>
</html>
