<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5원 연립방정식 마스터 - 가우스 조르단</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #007bff;
            --secondary: #6c757d;
            --accent: #28a745;
            --text-main: #212529;
            --border: #dee2e6;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }

        .container { max-width: 1200px; margin: auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-weight: 300; letter-spacing: -1px; }

        /* 입력 섹션 */
        .input-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(5, 75px) 30px 75px;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        input {
            width: 75px;
            height: 45px;
            text-align: center;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,123,255,0.15);
            background-color: #f8fbff;
        }

        .divider {
            text-align: center;
            font-weight: bold;
            color: var(--secondary);
            font-size: 1.5rem;
        }

        .btn-wrapper { text-align: center; margin-top: 30px; }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 45px;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,123,255,0.2);
            transition: 0.2s;
        }
        button:hover { background-color: #0069d9; transform: translateY(-1px); }

        /* 결과/과정 섹션 */
        .step-container { margin-top: 20px; }
        .step-box {
            background: white;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
            font-size: 0.9rem;
        }

        .step-info { color: var(--secondary); margin-bottom: 8px; font-weight: 600; }
        
        table { border-collapse: collapse; width: auto; margin: 5px 0; }
        td {
            border: 1px solid #f0f0f0;
            padding: 6px 12px;
            text-align: center;
            min-width: 60px;
            font-family: 'Consolas', monospace;
        }

        .inv-bg { background-color: #f9f9f9; color: #444; }

        .final-result {
            background: #212529;
            color: #fff;
            padding: 30px;
            border-radius: 12px;
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            text-align: center;
        }

        .res-item { border: 1px solid #444; padding: 15px; border-radius: 8px; }
        .res-label { display: block; color: #888; font-size: 0.8rem; margin-bottom: 5px; }
        .res-val { font-size: 1.2rem; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>5원 1차 연립방정식 솔루션</h1>
        <p>Matrix inversion via Gauss-Jordan Elimination</p>
    </header>

    <div class="input-card">
        <div class="matrix-grid" id="matrixInput">
            </div>
        <div class="btn-wrapper">
            <button onclick="runGaussJordan()">계산 실행하기</button>
        </div>
    </div>

    <div id="stepsArea"></div>
    <div id="finalResultArea"></div>
</div>

<script>
    // 분수 클래스
    class Fraction {
        constructor(n, d = 1) {
            if (d < 0) { n = -n; d = -d; }
            const common = this.gcd(Math.abs(n), Math.abs(d));
            this.n = n / common;
            this.d = d / common;
        }
        gcd(a, b) { return b === 0 ? a : this.gcd(b, a % b); }
        add(f) { return new Fraction(this.n * f.d + f.n * this.d, this.d * f.d); }
        sub(f) { return new Fraction(this.n * f.d - f.n * this.d, this.d * f.d); }
        mul(f) { return new Fraction(this.n * f.n, this.d * f.d); }
        div(f) { return new Fraction(this.n * f.d, this.d * f.n); }
        toString() { return this.d === 1 ? `${this.n}` : `${this.n}/${this.d}`; }
    }

    // 입력 그리드 생성 (5x5 A + | + B)
    const grid = document.getElementById('matrixInput');
    for (let i = 0; i < 5; i++) {
        for (let j = 0; j < 5; j++) {
            grid.innerHTML += `<input type="text" id="a${i}${j}" placeholder="a${i+1}${j+1}">`;
        }
        grid.innerHTML += `<div class="divider">|</div>`;
        grid.innerHTML += `<input type="text" id="b${i}" placeholder="b${i+1}" style="border-color: var(--accent)">`;
    }

    function parse(id) {
        let val = document.getElementById(id).value.trim() || "0";
        if (val.includes('/')) {
            const [n, d] = val.split('/').map(Number);
            return new Fraction(n, d);
        }
        return new Fraction(Number(val));
    }

    function printStep(mat, info) {
        let html = `<div class="step-box"><div class="step-info">${info}</div><div style="overflow-x:auto"><table>`;
        mat.forEach(row => {
            html += "<tr>";
            row.forEach((cell, idx) => {
                html += `<td class="${idx >= 5 ? 'inv-bg' : ''}">${cell.toString()}</td>`;
            });
            html += "</tr>";
        });
        html += "</table></div></div>";
        document.getElementById('stepsArea').innerHTML += html;
    }

    function runGaussJordan() {
        const steps = document.getElementById('stepsArea');
        const resArea = document.getElementById('finalResultArea');
        steps.innerHTML = "<h3>📊 단계별 행 연산 과정</h3>";
        resArea.innerHTML = "";

        // 데이터 로드
        let A = [], B = [];
        for (let i = 0; i < 5; i++) {
            let row = [];
            for (let j = 0; j < 5; j++) row.push(parse(`a${i}${j}`));
            A.push(row);
            B.push(parse(`b${i}`));
        }

        // 첨가행렬 [A | I]
        let mat = A.map((row, i) => [...row, ...[0,1,2,3,4].map(j => new Fraction(i === j ? 1 : 0))]);
        printStep(mat, "Step 0: 초기 첨가 행렬 생성");

        // 가우스 조르단 루프
        for (let i = 0; i < 5; i++) {
            let pivot = mat[i][i];
            if (pivot.n === 0) {
                alert("피벗이 0입니다. 해를 구할 수 없거나 행 교환이 필요합니다.");
                return;
            }

            // Pivot 1로 정규화
            mat[i] = mat[i].map(x => x.div(pivot));
            printStep(mat, `Step ${i+1}-1: ${i+1}행 정규화 (나누기 ${pivot})`);

            // 나머지 소거
            for (let j = 0; j < 5; j++) {
                if (i !== j) {
                    let factor = mat[j][i];
                    if (factor.n !== 0) {
                        mat[j] = mat[j].map((x, k) => x.sub(factor.mul(mat[i][k])));
                    }
                }
            }
            printStep(mat, `Step ${i+1}-2: ${i+1}열 소거 완료`);
        }

        // 해 계산 X = A⁻¹B
        const invA = mat.map(row => row.slice(5));
        const X = [];
        let resHtml = `<div class="final-result">`;
        for (let i = 0; i < 5; i++) {
            let sum = new Fraction(0);
            for (let j = 0; j < 5; j++) sum = sum.add(invA[i][j].mul(B[j]));
            X.push(sum);
            resHtml += `<div class="res-item"><span class="res-label">x${i+1}</span><span class="res-val">${sum.toString()}</span></div>`;
        }
        resHtml += `</div>`;
        resArea.innerHTML = "<h3>✅ 최종 결과</h3>" + resHtml;
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
