
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>전북과학고 정보 수행평가 알고리즘 필수 5조건</title>
<style>
body{margin:0;font-family:'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif;background:linear-gradient(135deg,#eff6ff,#fff7ed 45%,#ecfdf5);color:#172033;font-size:18px;line-height:1.7}
header{padding:40px 5vw;color:white;background:linear-gradient(120deg,#2563eb,#0891b2);border-bottom-left-radius:30px;border-bottom-right-radius:30px;box-shadow:0 10px 30px rgba(0,0,0,0.1)}
h1{font-size:36px;margin:0; text-shadow: 2px 2px 4px rgba(0,0,0,0.2)}
.subtitle{font-size:20px; opacity:0.9}
main{max-width:1100px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:20px;padding:25px;margin:20px 0;box-shadow:0 4px 15px rgba(0,0,0,0.05);border:1px solid #e2e8f0}
.code-box{background:#1e1e1e;color:#d4d4d4;padding:20px;border-radius:12px;font-family:'Consolas',monospace;font-size:16px;overflow-x:auto;white-space:pre;margin:15px 0; border: 1px solid #333}
.quiz-box{background:#f8fafc;padding:22px;border-radius:18px;border-left:6px solid #2563eb}
.q-title{font-weight:bold;color:#1e40af;margin-bottom:12px; font-size: 19px}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0}
.info-input{margin-bottom:30px;display:flex;gap:15px;align-items:center; background: #fff; padding: 20px; border-radius: 15px}
input[type="text"]{padding:12px;border:2px solid #cbd5e1;border-radius:10px;font-size:16px; width: 200px}
button{padding:14px 28px;background:#2563eb;color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:bold;font-size:17px; transition: 0.3s}
button:hover{background:#1d4ed8; transform: translateY(-2px)}
textarea{width:100%;padding:12px;border-radius:10px;border:2px solid #cbd5e1;font-size:16px; background: #fff}
#scoreBox{margin-top:30px;padding:30px;background:#fff;border-radius:25px;text-align:center; box-shadow: 0 10px 20px rgba(0,0,0,0.05)}
hr {border: 0; height: 1px; background: #e2e8f0; margin: 20px 0}
label {cursor: pointer; padding: 5px; display: inline-block}
</style>
</head>
<body>
<header>
    <h1>전북과학고 정보 수행평가 알고리즘 필수 5조건</h1>
    <p class="subtitle">입력, 출력, 명확성, 유한성, 유효성 원리 분석</p>
</header>
<main>
    <div class="card info-input">
        <input type="text" id="stdId" placeholder="학번 ">
        <input type="text" id="stdName" placeholder="이름 ">
    </div>

    <div id="quizContainer"></div>

    <div style="text-align:center;margin:50px 0">
        <button onclick="calculateScore()">채점 및 결과 생성</button>
        <button onclick="window.location.reload()" style="background:#64748b;margin-left:15px">초기화</button>
    </div>

    <div id="scoreBox"></div>
    <div style="text-align:center;margin-bottom:100px">
        <a id="downloadLink" style="display:none;padding:18px 30px;background:#059669;color:#fff;text-decoration:none;border-radius:12px;font-weight:bold; font-size: 18px"></a>
    </div>
</main>

<script>
const quizData = [{"title": "입력(Input) 조건 - 매개변수 활용", "code": "class Algo:\n    def process(self, a, b):\n        return a + b\n\nobj = Algo()\nprint(obj.process(5, 10))", "ox": "알고리즘은 외부에서 제공되는 입력이 반드시 1개 이상이어야 한다.", "ox_ans": "X", "choice": "알고리즘의 '입력' 조건에 대한 설명으로 옳은 것은?", "options": ["반드시 키보드로 입력받아야 한다", "0개 이상의 입력이 존재할 수 있다", "입력은 항상 정수여야 한다", "입력이 없으면 알고리즘이 아니다", "입력은 파일 형태로만 제공된다"], "choice_ans": "2", "short": "위 코드의 출력값은 무엇인가?", "short_ans": "15"}, {"title": "출력(Output) 조건 - 결과 반환", "code": "class Algo:\n    def check(self):\n        result = 'Success'\n        return result\n\nprint(Algo().check())", "ox": "알고리즘은 적어도 하나 이상의 결과를 반드시 출력해야 한다.", "ox_ans": "O", "choice": "알고리즘의 '출력' 조건이 의미하는 바는?", "options": ["화면에 반드시 글자를 찍어야 함", "파일로 저장해야 함", "최소 하나 이상의 결과를 생성해야 함", "입력값과 출력값이 같아야 함", "출력은 항상 숫자여야 함"], "choice_ans": "3", "short": "위 코드의 출력값은 무엇인가?", "short_ans": "Success"}, {"title": "명확성(Definiteness) - 조건문 활용", "code": "class Algo:\n    def decide(self, n):\n        if n % 2 == 0: return 'Even'\n        else: return 'Odd'\n\nprint(Algo().decide(7))", "ox": "명확성은 각 단계가 모호하지 않고 명확하게 정의되어야 함을 의미한다.", "ox_ans": "O", "choice": "위 코드에서 실행 흐름을 명확하게 나누기 위해 사용된 문법은?", "options": ["for", "while", "if-else", "try-except", "with"], "choice_ans": "3", "short": "출력되는 결과 문자열을 적으시오.", "short_ans": "Odd"}, {"title": "유한성(Finiteness) - 반복 제어", "code": "class Algo:\n    def run(self):\n        count = 0\n        for i in range(3):\n            count += 1\n        return count\n\nprint(Algo().run())", "ox": "알고리즘은 수행 후 반드시 종료되어야 한다.", "ox_ans": "O", "choice": "무한 루프에 빠진 코드는 알고리즘의 어떤 조건을 만족하지 못한 것인가?", "options": ["입력", "출력", "명확성", "유한성", "유효성"], "choice_ans": "4", "short": "위 코드의 최종 count 출력값은?", "short_ans": "3"}, {"title": "유효성(Effectiveness) - 실행 가능성", "code": "class Algo:\n    def divide(self, a, b):\n        if b == 0: return 'Error'\n        return a / b\n\nprint(Algo().divide(10, 2))", "ox": "유효성은 모든 명령이 컴퓨터에서 실제로 실행 가능해야 함을 의미한다.", "ox_ans": "O", "choice": "0으로 나누는 연산처럼 실행 불가능한 연산을 방지하는 것은 어떤 조건과 관련이 깊은가?", "options": ["입력", "출력", "명확성", "유한성", "유효성"], "choice_ans": "5", "short": "출력되는 결과 숫자를 적으시오.", "short_ans": "5.0"}, {"title": "리스트 입력과 유한성", "code": "class Algo:\n    def sum_list(self, nums):\n        total = 0\n        for n in nums: total += n\n        return total\n\nprint(Algo().sum_list([1, 2, 3]))", "ox": "for문을 리스트의 길이만큼 반복하는 것은 유한성을 보장하는 방법 중 하나다.", "ox_ans": "O", "choice": "입력값 nums가 빈 리스트([])일 때 출력되는 값은?", "options": ["None", "Error", "0", "1", "Empty"], "choice_ans": "3", "short": "코드 실행 결과 출력값을 적으시오.", "short_ans": "6"}, {"title": "명확한 데이터 변환 (Lambda)", "code": "class Algo:\n    def transform(self, x):\n        f = lambda n: n * 2\n        return f(x)\n\nprint(Algo().transform(10))", "ox": "람다(lambda) 함수는 이름이 없어 알고리즘의 명확성 조건을 위반한다.", "ox_ans": "X", "choice": "코드에서 사용된 익명 함수의 명칭은?", "options": ["def", "class", "lambda", "global", "yield"], "choice_ans": "3", "short": "출력되는 결과 숫자를 적으시오.", "short_ans": "20"}, {"title": "딕셔너리 출력과 유효성", "code": "class Algo:\n    def get_dict(self):\n        data = {'key': 'Value'}\n        return data.get('key')\n\nprint(Algo().get_dict())", "ox": "딕셔너리의 get 메서드는 키가 없을 때 에러를 방지하므로 유효성에 도움을 준다.", "ox_ans": "O", "choice": "딕셔너리 data에서 'key'에 해당하는 값을 가져오는 다른 표현은?", "options": ["data['key']", "data('key')", "data.key", "data{key}", "data.find('key')"], "choice_ans": "1", "short": "출력되는 결과 문자열을 적으시오.", "short_ans": "Value"}, {"title": "집합(Set)을 통한 명확한 중복 제거", "code": "class Algo:\n    def unique_len(self, data):\n        return len(set(data))\n\nprint(Algo().unique_len([1, 2, 2, 3]))", "ox": "set 자료형은 데이터의 순서를 유지하며 중복만 제거한다.", "ox_ans": "X", "choice": "위 알고리즘의 결과값으로 옳은 것은?", "options": ["1", "2", "3", "4", "5"], "choice_ans": "3", "short": "len(set([1, 1, 1]))의 결과는?", "short_ans": "1"}, {"title": "유한성 - While문의 종료 조건", "code": "class Algo:\n    def count_down(self, n):\n        res = []\n        while n > 0:\n            res.append(n)\n            n -= 1\n        return res\n\nprint(Algo().count_down(2))", "ox": "while n > 0 루프에서 n -= 1이 없다면 유한성 조건을 위반하게 된다.", "ox_ans": "O", "choice": "위 코드 실행 시 생성되는 리스트의 형태는?", "options": ["[2, 1, 0]", "[1, 2]", "[2, 1]", "[0, 1, 2]", "[2]"], "choice_ans": "3", "short": "출력되는 리스트 결과를 적으시오.", "short_ans": "[2, 1]"}, {"title": "유효성 - 문자열 인덱싱", "code": "class Algo:\n    def first_char(self, s):\n        if not s: return ''\n        return s[0]\n\nprint(Algo().first_char('Python'))", "ox": "빈 문자열에 대해 s[0]을 시도하는 것은 유효성(실행 가능성)에 어긋날 수 있다.", "ox_ans": "O", "choice": "위 코드에서 'Python'을 입력했을 때 반환되는 값은?", "options": ["P", "n", "Python", "y", "None"], "choice_ans": "1", "short": "출력되는 한 글자를 적으시오.", "short_ans": "P"}, {"title": "명확한 매개변수 전송 (*args)", "code": "class Algo:\n    def sum_all(self, *args):\n        return sum(args)\n\nprint(Algo().sum_all(1, 2, 3))", "ox": "*args 문법은 정해지지 않은 개수의 인자를 튜플 형태로 받는다.", "ox_ans": "O", "choice": "가변 인자 *args의 데이터 타입은 무엇인가?", "options": ["list", "dict", "set", "tuple", "str"], "choice_ans": "4", "short": "위 코드의 출력 숫자를 적으시오.", "short_ans": "6"}, {"title": "출력 조건 - 복합 결과 반환", "code": "class Algo:\n    def stat(self, n):\n        return n*2, n+2\n\nprint(Algo().stat(5))", "ox": "파이썬의 함수는 콤마(,)를 이용해 여러 개의 값을 동시에 반환할 수 있다.", "ox_ans": "O", "choice": "출력 결과 (10, 7)의 데이터 타입은 무엇인가?", "options": ["list", "tuple", "set", "int", "None"], "choice_ans": "2", "short": "위 코드 실행 시 출력되는 튜플을 적으시오. (괄호 포함)", "short_ans": "(10, 7)"}, {"title": "유한성 - 재귀 호출의 기저 조건", "code": "class Algo:\n    def fact(self, n):\n        if n <= 1: return 1\n        return n * self.fact(n-1)\n\nprint(Algo().fact(3))", "ox": "재귀 함수에서 종료 조건(if n <= 1)이 없어도 유한성이 보장된다.", "ox_ans": "X", "choice": "3! (3 팩토리얼)의 계산 결과는?", "options": ["1", "3", "6", "9", "12"], "choice_ans": "3", "short": "위 코드의 출력 숫자를 적으시오.", "short_ans": "6"}, {"title": "명확성 - 리스트 컴프리헨션", "code": "class Algo:\n    def filter_even(self, data):\n        return [x for x in data if x % 2 == 0]\n\nprint(Algo().filter_even([1, 2, 3, 4]))", "ox": "리스트 컴프리헨션은 코드를 간결하게 하여 명확성을 높일 수 있는 문법이다.", "ox_ans": "O", "choice": "위 코드의 결과 리스트로 옳은 것은?", "options": ["[1, 3]", "[2, 4]", "[1, 2]", "[3, 4]", "[1, 2, 3, 4]"], "choice_ans": "2", "short": "출력되는 리스트 결과는?", "short_ans": "[2, 4]"}, {"title": "유효성 - 형 변환 (Casting)", "code": "class Algo:\n    def to_int(self, s):\n        try: return int(s)\n        except: return 0\n\nprint(Algo().to_int('123'))", "ox": "문자열 'ABC'를 int()로 변환하려는 시도는 유효성 문제를 일으킨다.", "ox_ans": "O", "choice": "위 코드에서 '123' 대신 '3.14'를 넣었을 때 int() 변환 결과는?(에러 제외시)", "options": ["3.14", "3", "0", "Error", "4"], "choice_ans": "3", "short": "출력되는 숫자를 적으시오.", "short_ans": "123"}, {"title": "입력 조건 - 기본값 매개변수", "code": "class Algo:\n    def greet(self, name='User'):\n        return f'Hi {name}'\n\nprint(Algo().greet())", "ox": "입력 인자가 전달되지 않아도 기본값을 설정하면 알고리즘은 동작한다.", "ox_ans": "O", "choice": "입력 인자 없이 호출했을 때 출력되는 결과는?", "options": ["Hi", "Hi User", "Hi name", "Error", "Hi None"], "choice_ans": "2", "short": "출력되는 문자열을 정확히 적으시오.", "short_ans": "Hi User"}, {"title": "출력 조건 - Boolean 결과", "code": "class Algo:\n    def is_positive(self, n):\n        return n > 0\n\nprint(Algo().is_positive(-5))", "ox": "True 또는 False와 같은 논리값도 알고리즘의 유효한 출력 결과다.", "ox_ans": "O", "choice": "위 코드 실행 시 출력되는 값은?", "options": ["True", "False", "None", "0", "1"], "choice_ans": "2", "short": "출력되는 단어(대소문자 주의)를 적으시오.", "short_ans": "False"}, {"title": "명확성 - 슬라이싱 활용", "code": "class Algo:\n    def get_tail(self, data):\n        return data[1:]\n\nprint(Algo().get_tail([10, 20, 30]))", "ox": "data[1:] 슬라이싱은 인덱스 1부터 끝까지의 요소를 추출한다.", "ox_ans": "O", "choice": "위 코드의 실행 결과로 옳은 것은?", "options": ["[10]", "[20, 30]", "[10, 20]", "[30]", "[10, 30]"], "choice_ans": "2", "short": "출력되는 리스트 결과는?", "short_ans": "[20, 30]"}, {"title": "유한성 - 리스트 요소 제거", "code": "class Algo:\n    def clear_all(self, data):\n        while data:\n            data.pop()\n        return 'Empty'\n\nprint(Algo().clear_all([1, 2]))", "ox": "pop()을 통해 리스트의 길이를 줄여 나가는 루프는 유한성을 만족한다.", "ox_ans": "O", "choice": "while data: 조건의 의미는?", "options": ["data가 비어있을 때 실행", "data가 비어있지 않을 때 실행", "data가 리스트일 때 실행", "항상 실행", "data의 첫 요소가 0일 때 실행"], "choice_ans": "2", "short": "코드 실행 후 최종 반환되는 문자열은?", "short_ans": "Empty"}];

function renderQuiz() {
    const container = document.getElementById('quizContainer');
    quizData.forEach((q, i) => {
        const idx = i + 1;
        let html = `
        <div class="card">
            <h3 style="color:#0f172a; margin-top:0">문항 ${idx}. ${q.title}</h3>
            <div class="code-box">${q.code}</div>
            
            <div class="quiz-box">
                <div class="q-title">Q1. OX 퀴즈: ${q.ox}</div>
                <label><input type="radio" name="ox_${idx}" value="O"> O (참)</label>
                <label style="margin-left:30px"><input type="radio" name="ox_${idx}" value="X"> X (거짓)</label>
                <hr>
                
                <div class="q-title">Q2. 5지 선다: ${q.choice}</div>
                <div class="options">
                    ${q.options.map((opt, oi) => `
                        <label><input type="radio" name="choice_${idx}" value="${oi+1}">${oi+1}) ${opt}</label>
                    `).join('')}
                </div>
                <hr>
                
                <div class="q-title">Q3. 서술형: ${q.short}</div>
                <textarea id="short_${idx}" rows="1" placeholder="정확한 출력 결과값을 입력하세요."></textarea>
            </div>
        </div>`;
        container.innerHTML += html;
    });
}

function calculateScore() {
    const sid = document.getElementById('stdId').value || "학번미입력";
    const name = document.getElementById('stdName').value || "이름미입력";
    const now = new Date();
    const timeStr = now.getHours() + "시" + now.getMinutes() + "분";
    
    let totalScore = 0;
    const maxScore = quizData.length * 3;
    let detailLines = [
        "========================================",
        "   알고리즘 5조건 수행평가 결과 리포트",
        "========================================",
        "학번: " + sid,
        "이름: " + name,
        "응시일시: " + now.toLocaleString(),
        "----------------------------------------"
    ];
    
    quizData.forEach((q, i) => {
        const idx = i + 1;
        let qScore = 0;
        
        const oxVal = document.querySelector(`input[name="ox_${idx}"]:checked`)?.value;
        const choiceVal = document.querySelector(`input[name="choice_${idx}"]:checked`)?.value;
        const shortVal = document.getElementById(`short_${idx}`).value.trim();
        
        if(oxVal === q.ox_ans) qScore++;
        if(choiceVal === q.choice_ans) qScore++;
        if(shortVal === q.short_ans) qScore++;
        
        totalScore += qScore;
        detailLines.push(`문항 ${idx}: ${qScore}/3점 (OX:${oxVal||'X'}, 선택:${choiceVal||'X'}, 서술:${shortVal||'미입력'})`);
    });
    
    const finalPercent = Math.round((totalScore / maxScore) * 100);
    detailLines.push("----------------------------------------");
    detailLines.push("최종 점수: " + totalScore + " / " + maxScore);
    detailLines.push("환산 점수: " + finalPercent + "점");
    detailLines.push("========================================");
    
    document.getElementById('scoreBox').innerHTML = `
        <h2 style="color:#2563eb; font-size: 32px">채점 완료! 점수: ${finalPercent}점</h2>
        <p style="font-size: 20px">${name} 학생, 총 ${totalScore}점을 획득하였습니다.</p>
    `;
    
    const blob = new Blob([detailLines.join("\n")], {type: 'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const link = document.getElementById('downloadLink');
    const filename = sid + "_" + name + "_알고리즘5조건_" + finalPercent + "점.txt";
    link.href = url;
    link.download = filename;
    link.style.display = 'inline-block';
    link.textContent = "결과 리포트 파일(.txt) 다운로드";
}

renderQuiz();
</script>
