<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP3 자동 자막 플레이어</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(135deg, #111827, #1e3a8a, #312e81);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .app {
      width: min(1050px, 100%);
      min-height: 620px;
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 30px 32px 20px;
      text-align: center;
      background: rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }
    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: -1px;
    }
    .desc {
      margin-top: 10px;
      color: #cbd5e1;
      font-size: 16px;
    }
    .main {
      flex: 1;
      padding: 28px 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }
    .panel {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 22px;
      padding: 22px;
    }
    .panel h2 {
      margin: 0 0 16px;
      font-size: 21px;
    }
    .file-box {
      margin-bottom: 18px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(2,6,23,0.45);
      border: 1px dashed rgba(255,255,255,0.25);
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 10px;
      color: #fde68a;
    }
    input[type="file"] {
      width: 100%;
      padding: 12px;
      background: #0f172a;
      color: #e5e7eb;
      border: 1px solid #334155;
      border-radius: 12px;
    }
    audio {
      width: 100%;
      margin-top: 10px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 13px 18px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: white;
      transition: 0.2s;
    }
    button:hover { transform: translateY(-2px); }
    .play { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .pause { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .stop { background: linear-gradient(135deg, #ef4444, #b91c1c); }
    .sample { background: linear-gradient(135deg, #6366f1, #4338ca); }
    .status {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(15,23,42,0.75);
      color: #cbd5e1;
      line-height: 1.6;
      font-size: 15px;
    }
    textarea {
      width: 100%;
      min-height: 280px;
      resize: vertical;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 16px;
      background: #020617;
      color: #e5e7eb;
      font-size: 15px;
      line-height: 1.7;
    }
    .subtitle-area {
      padding: 26px 32px 34px;
      background: rgba(0,0,0,0.45);
      border-top: 1px solid rgba(255,255,255,0.14);
    }
    .subtitle {
      min-height: 110px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
      border-radius: 22px;
      background: #000;
      color: #facc15;
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 900;
      line-height: 1.45;
      text-shadow: 0 2px 8px rgba(250,204,21,0.25);
    }
    .progress-wrap {
      margin-top: 18px;
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      overflow: hidden;
    }
    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #facc15, #fb7185);
    }
    .time {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      color: #cbd5e1;
      font-size: 14px;
    }
    @media (max-width: 820px) {
      .main { grid-template-columns: 1fr; }
      h1 { font-size: 27px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🎵 MP3 자동 자막 플레이어</h1>
    </header>

    <section class="main">
      <div class="panel">
        <h2>① 파일 선택</h2>

        <div class="file-box">
          <label for="mp3File">🎧 MP3 파일 선택</label>
          <input type="file" id="mp3File" accept="audio/mp3,audio/mpeg" />
          <audio id="audio" controls></audio>
        </div>

        <div class="file-box">
          <label for="txtFile">📄 TXT 자막 파일 선택</label>
          <input type="file" id="txtFile" accept=".txt,text/plain" />
        </div>

        <div class="controls">
          <button class="play" onclick="playAudio()">▶ 재생</button>
          <button class="pause" onclick="pauseAudio()">⏸ 일시정지</button>
          <button class="stop" onclick="stopAudio()">■ 정지</button>
          <button class="sample" onclick="loadSampleText()">샘플 자막</button>
        </div>
       
      </div>

      <div class="panel">
        <h2>② 자막 내용</h2>
        <textarea id="textInput" placeholder="TXT 파일을 선택하거나 여기에 자막 문장을 직접 입력하세요."></textarea>
<div class="status" id="status">
          MP3와 TXT 파일을 선택하세요. TXT가 없으면 오른쪽 입력창에 직접 자막을 붙여넣어도 됩니다.
        </div>

      </div>

    </section>

    <section class="subtitle-area">
      <div class="subtitle" id="subtitle">자막이 여기에 표시됩니다.</div>
      <div class="progress-wrap"><div class="progress" id="progress"></div></div>
      <div class="time">
        <span id="currentTime">00:00</span>
        <span id="duration">00:00</span>
      </div>
    </section>
  </div>

  <script>
    const mp3File = document.getElementById("mp3File");
    const txtFile = document.getElementById("txtFile");
    const audio = document.getElementById("audio");
    const textInput = document.getElementById("textInput");
    const subtitleBox = document.getElementById("subtitle");
    const statusBox = document.getElementById("status");
    const progress = document.getElementById("progress");
    const currentTimeBox = document.getElementById("currentTime");
    const durationBox = document.getElementById("duration");

    let subtitles = [];

    mp3File.addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;

      const url = URL.createObjectURL(file);
      audio.src = url;
      statusBox.innerHTML = "✅ MP3 파일 선택 완료: " + file.name;
    });

    txtFile.addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        textInput.value = e.target.result;
        statusBox.innerHTML = "✅ TXT 자막 파일 선택 완료: " + file.name;
      };
      reader.readAsText(file, "UTF-8");
    });

    function splitSentences(text) {
      text = text.replace(/\r?\n/g, " ").replace(/\s+/g, " ").trim();
      if (!text) return [];

      const result = [];
      let sentence = "";

      for (let i = 0; i < text.length; i++) {
        sentence += text[i];

        const lastTwo = sentence.slice(-2);
        const lastThree = sentence.slice(-3);
        const lastFour = sentence.slice(-4);
        const ch = text[i];

        if (
          [".", "!", "?", "。", "！", "？"].includes(ch) ||
          lastTwo === "다." ||
          lastTwo === "요." ||
          lastThree === "니다." ||
          lastTwo === "까." ||
          lastFour === "습니다."
        ) {
          const trimmed = sentence.trim();
          if (trimmed) result.push(trimmed);
          sentence = "";
        }
      }

      if (sentence.trim()) result.push(sentence.trim());
      return result;
    }

    function makeSubtitles() {
      const text = textInput.value.trim();
      const duration = audio.duration;

      if (!audio.src) {
        alert("MP3 파일을 먼저 선택하세요.");
        return false;
      }

      if (!text) {
        alert("TXT 자막 파일을 선택하거나 자막 내용을 입력하세요.");
        return false;
      }

      if (!duration || isNaN(duration)) {
        alert("MP3 정보를 아직 읽는 중입니다. 잠시 후 다시 재생을 누르세요.");
        return false;
      }

      const sentences = splitSentences(text);
      if (sentences.length === 0) {
        alert("자막 문장을 찾을 수 없습니다.");
        return false;
      }

      const totalChars = sentences.reduce((sum, s) => sum + s.length, 0);
      let current = 0;
      subtitles = [];

      for (const s of sentences) {
        const partDuration = duration * (s.length / totalChars);
        subtitles.push({ start: current, end: current + partDuration, text: s });
        current += partDuration;
      }

      statusBox.innerHTML = `✅ 자막 ${subtitles.length}개 생성 완료 / 전체 길이 ${formatTime(duration)}`;
      return true;
    }

    function playAudio() {
      if (!makeSubtitles()) return;
      audio.play();
    }

    function pauseAudio() {
      audio.pause();
      statusBox.innerHTML = "⏸ 일시정지되었습니다.";
    }

    function stopAudio() {
      audio.pause();
      audio.currentTime = 0;
      subtitleBox.textContent = "정지되었습니다.";
      progress.style.width = "0%";
      currentTimeBox.textContent = "00:00";
      statusBox.innerHTML = "■ 정지되었습니다.";
    }

    audio.addEventListener("timeupdate", function () {
      const now = audio.currentTime;
      const total = audio.duration || 0;

      const current = subtitles.find(s => now >= s.start && now <= s.end);
      subtitleBox.textContent = current ? current.text : "";

      if (total > 0) {
        progress.style.width = ((now / total) * 100) + "%";
        currentTimeBox.textContent = formatTime(now);
        durationBox.textContent = formatTime(total);
      }
    });

    audio.addEventListener("ended", function () {
      subtitleBox.textContent = "재생 완료";
      statusBox.innerHTML = "✅ 음악이 끝났습니다.";
    });

    audio.addEventListener("loadedmetadata", function () {
      durationBox.textContent = formatTime(audio.duration);
    });

    function formatTime(sec) {
      if (!sec || isNaN(sec)) return "00:00";
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
    }

    function loadSampleText() {
      textInput.value = `옛날 어느 산골 마을에 지게 양쪽에 항아리 두 개를 매달고 매일같이 강가로 물을 길러나가는 한 노인이 있었습니다.
오른쪽 항아리는 물을 한 방울도 흘리지 않았지만 왼쪽 항아리는 몸체에 가느다란 금이 있었습니다.
집 마당에 도착할 때쯤이면 오른쪽 항아리는 물이 가득 차 있었지만 금이 간 왼쪽 항아리는 물을 절반밖에 남기지 못했습니다.
금이 간 항아리는 자신의 결함 때문에 노인에게 짐이 되는 것 같아 깊은 자책감에 빠졌습니다.
노인은 인자한 미소를 지으며 항아리에게 말했습니다.
집으로 돌아가는 길가를 유심히 살펴보렴.
네가 물을 흘린 쪽 길가에만 알록달록한 꽃들이 피어 있지 않니?
나는 네 몸에 금이 있다는 걸 알고 있었단다.
그래서 네가 물을 흘리는 그쪽 길가에만 꽃씨를 뿌려두었지.
네가 매일 조금씩 흘려준 물 덕분에 이 척박한 길은 꽃밭이 되었단다.
당신의 상처는 당신을 무너뜨리는 결함이 아니라 세상을 더 아름답게 물들이는 축복의 통로입니다.`;
      statusBox.innerHTML = "✅ 샘플 자막이 입력되었습니다.";
    }
  </script>
</body>
</html>
