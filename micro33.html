let graded=false, lastScore=0, detailLines=[];
function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');}
function render(){const form=document.getElementById('quizForm');form.innerHTML='';questions.forEach((item,i)=>{const box=document.createElement('section');box.className='q';box.id='q'+i;box.innerHTML=`<h3><span class="tag">선택형</span>문항 ${i+1}. ${esc(item.q)}</h3><p class="rule">보기 5개 중 <b>옳은 것 3개</b>를 고르시오.</p>`+item.choices.map((c,j)=>`<label class="choice"><input type="checkbox" name="q${i}" value="${j}"> ${String.fromCharCode(9312+j)} ${esc(c)}</label>`).join('')+`<div class="explain" id="ex${i}" style="display:none"></div>`;form.appendChild(box);});document.querySelectorAll('input[type=checkbox]').forEach(cb=>{cb.addEventListener('change',e=>{const name=e.target.name;const checked=document.querySelectorAll(`input[name="${name}"]:checked`);if(checked.length>3){e.target.checked=false;alert('각 문항은 3개까지만 선택할 수 있습니다.');}});});}
function selectedIdx(i){return [...document.querySelectorAll(`input[name="q${i}"]:checked`)].map(x=>Number(x.value)).sort((a,b)=>a-b);}
function same(a,b){return a.length===b.length && a.every((v,i)=>v===b[i]);}
function choiceNames(item,arr){return arr.map(n=>`${String.fromCharCode(9312+n)} ${item.choices[n]}`);}
function gradeQuiz(){const id=document.getElementById('studentId').value.trim();const name=document.getElementById('studentName').value.trim();if(!id||!name){alert('학번과 이름을 입력하세요.');return;}let correct=0;detailLines=[];questions.forEach((item,i)=>{const user=selectedIdx(i);const ans=[...item.answers].sort((a,b)=>a-b);const ok=same(user,ans);if(ok)correct++;const qbox=document.getElementById('q'+i);qbox.classList.remove('correct','wrong');qbox.classList.add(ok?'correct':'wrong');const ex=document.getElementById('ex'+i);ex.style.display='block';const userText=user.length?choiceNames(item,user).join('<br>'):'미응답';const ansText=choiceNames(item,ans).join('<br>');ex.innerHTML=`<div>${ok?'<span class="ok">정답</span>':'<span class="no">오답</span>'} ${user.length!==3?'<span class="warn">※ 3개를 선택해야 합니다.</span>':''}</div><div><b>나의 선택:</b><br>${userText}</div><div><b>정답:</b><br>${ansText}</div><div><b>상세 풀이:</b> ${esc(item.ex)}</div>`;detailLines.push(`${i+1}. ${item.q}\n나의 선택: ${user.length?choiceNames(item,user).join(' / '):'미응답'}\n정답: ${choiceNames(item,ans).join(' / ')}\n채점: ${ok?'정답':'오답'}\n상세 풀이: ${item.ex}`);});lastScore=correct*5;graded=true;const result=document.getElementById('result');result.style.display='block';result.innerHTML=`<h2>채점 결과</h2><p class="score">${esc(id)} ${esc(name)} : ${lastScore}점 / 100점</p><p>정답 ${correct}개, 오답 ${questions.length-correct}개입니다. 각 문항 아래에서 정오답과 상세 풀이를 확인할 수 있습니다.</p>`;window.scrollTo({top:result.offsetTop-90,behavior:'smooth'});}
function downloadTxt(){if(!graded){gradeQuiz();if(!graded)return;}const id=document.getElementById('studentId').value.trim();const name=document.getElementById('studentName').value.trim();const now=new Date();const time=now.toLocaleString('ko-KR');const content=`마이크로비트 라디오 통신 선택형 퀴즈 결과\n학번: ${id}\n이름: ${name}\n점수: ${lastScore}점 / 100점\n응시시각: ${time}\n\n[문항별 정오답 및 상세 풀이]\n\n${detailLines.join('\n\n')}`;const blob=new Blob([content],{type:'text/plain;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${id}_${name}_${lastScore}_마이크로비트_선택3.txt`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);}
render();
</script>
