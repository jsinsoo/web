<style>

</head>
<body>
<header><h1>디지털 문화·인공지능 골고루 퀴즈 24문항</h1></header>
<div class="wrap">
  <section class="info">

    <span class="small">학번과 이름을 입력한 뒤 제출하면 점수, 정오답, 상세 풀이를 확인하고 TXT로 저장할 수 있습니다.</span>

트 접속을 유도하는 행위이다. 문자 메시지 기반 피싱은 스미싱이다."}, {"type": "mc", "unit": "503 정보 보안과 디지털 윤리", "q": "정보 보안의 3요소에 해당하지 않는 것은?", "choices": ["기밀성", "무결성", "가용성", "개방성", "정보 보호"], "answer": "개방성", "exp": "정보 보안의 3요소는 기밀성, 무결성, 가용성이다."}, {"type": "mc", "unit": "503 정보 보안과 디지털 윤리", "q": "정보 보안을 실천하는 사용자 행동으로 가장 적절한 것은?", "choices": ["비밀번호를 오래 바꾸지 않는다", "백신과 보안 패치를 업데이트한다", "수상한 링크를 모두 클릭한다", "공용 PC에 개인 정보를 저장한다", "알 수 없는 첨부 파일을 실행한다"], "answer": "백신과 보안 패치를 업데이트한다", "exp": "안전한 비밀번호 설정, 주기적 변경, 백신과 보안 패치 업데이트는 정보 보안 실천 방안이다."}, {"type": "ox", "unit": "401 인공지능과 지능 에이전트", "q": "인공지능은 탐색, 추론, 학습 등 인간의 지적 능력 일부 또는 전체를 구현하는 컴퓨터 과학 기술이다.", "answer": "O", "exp": "인공지능은 인간의 지적 능력을 컴퓨터 과학 기술로 구현하는 분야이다."}, {"type": "ox", "unit": "401 인공지능과 지능 에이전트", "q": "지능 에이전트는 센서로 환경을 감지하지만 판단이나 행동은 전혀 하지 않는다.", "answer": "X", "exp": "지능 에이전트는 센서로 인식하고, 판단한 뒤 구동기를 통해 행동한다."}, {"type": "mc", "unit": "401 인공지능과 지능 에이전트", "q": "지능 에이전트의 일반적인 작동 흐름으로 가장 적절한 것은?", "choices": ["행동 → 인식 → 판단", "인식 → 판단 → 행동", "판단 → 행동 → 인식", "저장 → 삭제 → 종료", "입력 금지 → 출력 금지 → 정지"], "answer": "인식 → 판단 → 행동", "exp": "지능 에이전트는 환경을 인식하고 판단한 후 행동한다."}, {"type": "mc", "unit": "401 인공지능과 지능 에이전트", "q": "튜링 테스트와 가장 관련 깊은 질문은?", "choices": ["컴퓨터가 사람처럼 생각할 수 있는가?", "컴퓨터 화면의 해상도는 얼마인가?", "프린터 잉크는 얼마나 남았는가?", "마우스 속도는 빠른가?", "파일명은 몇 글자인가?"], "answer": "컴퓨터가 사람처럼 생각할 수 있는가?", "exp": "튜링 테스트는 기계가 사고할 수 있는가라는 질문에서 출발했다."}, {"type": "ox", "unit": "402 기계학습의 이해", "q": "기계학습은 컴퓨팅 시스템이 데이터로부터 규칙을 학습하고 모델을 만들어 예측이나 판단을 내리는 것이다.", "answer": "O", "exp": "기계학습은 데이터로부터 규칙을 학습하여 새로운 데이터에 대한 예측·판단을 수행한다."}, {"type": "ox", "unit": "402 기계학습의 이해", "q": "비지도학습은 각 데이터에 대한 정답을 함께 알려 주고 학습하는 방식이다.", "answer": "X", "exp": "정답을 함께 알려 주고 학습하는 것은 지도학습이며, 비지도학습은 정답 없이 데이터만으로 학습한다."}, {"type": "mc", "unit": "402 기계학습의 이해", "q": "지도학습의 설명으로 가장 적절한 것은?", "choices": ["정답이 있는 데이터로 학습한다", "정답 없이 군집만 찾는다", "데이터를 전혀 사용하지 않는다", "항상 사람이 규칙을 직접 코딩한다", "컴퓨터가 무작위로만 행동한다"], "answer": "정답이 있는 데이터로 학습한다", "exp": "지도학습은 각 데이터에 대한 정답이 주어진 상태에서 모델을 학습한다."}, {"type": "mc", "unit": "402 기계학습의 이해", "q": "전통적 프로그래밍 방식과 비교한 기계학습의 특징으로 적절한 것은?", "choices": ["사람이 모든 판단 규칙을 직접 입력해야만 한다", "데이터와 원하는 결과를 바탕으로 규칙을 찾아낼 수 있다", "데이터를 저장하지 못한다", "새로운 데이터에는 절대 적용할 수 없다", "학습 모델을 만들 수 없다"], "answer": "데이터와 원하는 결과를 바탕으로 규칙을 찾아낼 수 있다", "exp": "기계학습은 데이터와 결과를 통해 스스로 규칙을 찾아 모델을 만든다."}, {"type": "ox", "unit": "403 기계학습을 이용한 문제 해결", "q": "기계학습 문제 해결에서 문제 정의 단계는 현재 상태와 목표 상태를 분석하므로 중요하다.", "answer": "O", "exp": "문제 정의는 문제 상황, 현재 상태, 목표 상태를 명확히 하여 해결 방향을 정하는 단계이다."}, {"type": "ox", "unit": "403 기계학습을 이용한 문제 해결", "q": "기계학습으로 해결할 가능성은 데이터의 양과 질과는 아무 관련이 없다.", "answer": "X", "exp": "충분한 양과 우수한 품질의 데이터가 있는지는 기계학습 가능성을 판단하는 중요한 기준이다."}, {"type": "mc", "unit": "403 기계학습을 이용한 문제 해결", "q": "기계학습 모델을 이용한 문제 해결 과정의 순서로 가장 적절한 것은?", "choices": ["문제 정의 → 데이터 탐색 및 전처리 → 유형·알고리즘 선정 → 모델 생성 → 성능 평가", "성능 평가 → 문제 정의 → 데이터 삭제 → 모델 포기 → 결과 숨김", "모델 생성 → 문제 정의 → 데이터 수집 금지 → 평가 생략", "알고리즘 선정 → 문제 삭제 → 출력 금지 → 평가", "데이터 전처리 → 문제 무시 → 모델 생성 → 학습 금지"], "answer": "문제 정의 → 데이터 탐색 및 전처리 → 유형·알고리즘 선정 → 모델 생성 → 성능 평가", "exp": "교재의 과정은 문제 정의, 데이터 탐색 및 전처리, 유형과 알고리즘 선정, 모델 생성, 성능 평가의 흐름이다."}, {"type": "mc", "unit": "403 기계학습을 이용한 문제 해결", "q": "자동차 CO₂ 배출량 예측 문제에서 입력 속성으로 활용하기에 가장 적절한 것은?", "choices": ["자동차 연료량과 엔진 크기 등 차량 속성", "학생의 좋아하는 색", "오늘의 급식 메뉴", "교실 자리 번호만", "무작위 숫자 하나"], "answer": "자동차 연료량과 엔진 크기 등 차량 속성", "exp": "자동차의 연료 소비량, 엔진 크기 등 관련 속성을 이용해 CO₂ 배출량을 예측할 수 있다."}];
const form = document.getElementById('quiz');
questions.forEach((item, idx) => {
  const card = document.createElement('div');
  card.className = 'card';
  const opts = item.type === 'ox' ? ['O','X'] : item.choices;
  card.innerHTML = `
    <span class="unit">${item.unit}</span>
    <div class="qno">문항 ${idx+1} · ${item.type === 'ox' ? 'OX' : '5지선다형'}</div>
    <div class="q">${item.q}</div>
    <div class="opts">
      ${opts.map(o => `<label><input type="radio" name="q${idx}" value="${String(o).replaceAll('"','&quot;')}"> ${o}</label>`).join('')}
    </div>
    <div class="exp" id="exp${idx}"></div>
  `;
  form.appendChild(card);
});
let graded = false, score = 0;
function grade(){
  score = 0;
  questions.forEach((item, idx) => {
    const picked = document.querySelector(`input[name="q${idx}"]:checked`);
    const labels = [...document.querySelectorAll(`input[name="q${idx}"]`)].map(x=>x.parentElement);
    labels.forEach(l=>l.classList.remove('correct','wrong'));
    labels.forEach(l=>{
      const val = l.querySelector('input').value;
      if(val === item.answer) l.classList.add('correct');
    });
    if(picked){
      if(picked.value === item.answer) score++;
      else picked.parentElement.classList.add('wrong');
    }
    const exp = document.getElementById('exp'+idx);
    exp.style.display = 'block';
    exp.innerHTML = `<b>정답:</b> ${item.answer}<br><b>풀이:</b> ${item.exp}`;
  });
  graded = true;
  document.getElementById('result').innerHTML = `점수: ${score} / ${questions.length}점`;
  window.scrollTo({top:0,behavior:'smooth'});
}
function saveTxt(){
  if(!graded) grade();
  const sid = document.getElementById('sid').value.trim() || '학번';
  const name = document.getElementById('sname').value.trim() || '이름';
  const now = new Date();
  const stamp = now.toISOString().replace(/[:.]/g,'-');
  let lines = [];
  lines.push(`학번: ${sid}`);
  lines.push(`이름: ${name}`);
  lines.push(`점수: ${score}/${questions.length}`);
  lines.push(`응시시각: ${now.toLocaleString()}`);
  lines.push('='.repeat(50));
  questions.forEach((item, idx) => {
    const picked = document.querySelector(`input[name="q${idx}"]:checked`);
    const ans = picked ? picked.value : '미응답';
    lines.push(`${idx+1}. [${item.unit}] ${item.q}`);
    lines.push(`내 답: ${ans} / 정답: ${item.answer} / ${ans===item.answer?'정답':'오답'}`);
    lines.push(`풀이: ${item.exp}`);
    lines.push('-'.repeat(50));
  });
  const blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${sid}_${name}_${score}점_골고루퀴즈24문항_${stamp}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
</body>
</html>
