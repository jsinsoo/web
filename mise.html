<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전국 시도별 미세먼지 실시간 분석기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .controls { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 30px; }
        select { padding: 8px 15px; font-size: 16px; border-radius: 5px; border: 1px solid #ddd; }
        button { padding: 10px 20px; font-size: 16px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #45a049; }
        .chart-container { position: relative; height: 400px; width: 100%; }
        h1 { text-align: center; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>전국 시도별 미세먼지(PM10) 분석</h1>
    
    <div class="controls">
        <label for="sidoSelect">분석할 시도 선택:</label>
        <select id="sidoSelect">
            <option value="서울">서울</option>
            <option value="부산">부산</option>
            <option value="대구">대구</option>
            <option value="인천">인천</option>
            <option value="광주">광주</option>
            <option value="대전">대전</option>
            <option value="울산">울산</option>
            <option value="경기">경기</option>
            <option value="강원">강원</option>
            <option value="충북">충북</option>
            <option value="충남">충남</option>
            <option value="전북">전북</option>
            <option value="전남">전남</option>
            <option value="경북">경북</option>
            <option value="경남">경남</option>
            <option value="제주">제주</option>
            <option value="세종">세종</option>
        </select>
        <button onclick="fetchData()">데이터 분석 시작</button>
    </div>

    <div class="chart-container">
        <canvas id="airChart"></canvas>
    </div>
</div>

<script>
    let airChart;

    async function fetchData() {
        const sido = document.getElementById('sidoSelect').value;
        const serviceKey = 'eb995e1b419400d31480385c6b40c859b8ade3502da6cf3823d9b84f1d69c8a6'; // 사용자 인증키
        const url = `http://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getCtprvnRltmMesureDnsty?serviceKey=${encodeURIComponent(serviceKey)}&returnType=json&numOfRows=100&pageNo=1&sidoName=${encodeURIComponent(sido)}&ver=1.0`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            const items = data.response.body.items;

            if (!items || items.length === 0) {
                alert("데이터를 가져오지 못했습니다.");
                return;
            }

            // 데이터 가공: PM10 기준 내림차순 정렬 및 상위 15개 추출
            const sortedItems = items
                .filter(item => item.pm10Value !== '-' && item.pm10Value !== null)
                .map(item => ({
                    station: item.stationName,
                    value: parseInt(item.pm10Value)
                }))
                .sort((a, b) => b.value - a.value)
                .slice(0, 15);

            renderChart(sortedItems, sido);
        } catch (error) {
            console.error("Error:", error);
            alert("API 호출 중 오류가 발생했습니다. (CORS 정책 확인 필요)");
        }
    }

    function renderChart(data, sido) {
        const ctx = document.getElementById('airChart').getContext('2d');
        
        // 기존 차트가 있으면 삭제
        if (airChart) {
            airChart.destroy();
        }

        const labels = data.map(item => item.station);
        const values = data.map(item => item.value);
        const colors = values.map(v => v > 80 ? 'rgba(255, 99, 132, 0.7)' : v > 30 ? 'rgba(255, 206, 86, 0.7)' : 'rgba(75, 192, 192, 0.7)');

        airChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: `${sido} 지역별 미세먼지(PM10) 농도`,
                    data: values,
                    backgroundColor: colors,
                    borderColor: colors.map(c => c.replace('0.7', '1')),
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: '농도 (µg/m³)' } }
                },
                plugins: {
                    title: { display: true, text: `[${sido}] 주요 지역별 대기질 현황`, font: { size: 18 } }
                }
            }
        });
    }
</script>

</body>
</html>
