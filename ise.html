let userAnswers = new Array(quizData.length).fill(null);

function initQuiz() {
    const area = document.getElementById('quiz_area');
    quizData.forEach((q, index) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'question';
        
        let optionsHtml = '';
        q.options.forEach((opt, i) => {
            optionsHtml += `<li onclick="selectOption(${index}, ${i})">${i + 1}. ${opt}</li>`;
        });

        qDiv.innerHTML = `
            <h3>문항 ${index + 1}. ${q.title}</h3>
            <p>다음 소스 코드를 보고 <b>틀린 설명</b>을 하나 고르시오.</p>
            <div class="code-box">${q.code}</div>
            <ul class="options" id="opt_${index}">
                ${optionsHtml}
            </ul>
            <div class="explanation" id="exp_${index}">
                <strong>정답: ${q.answer + 1}번</strong><br>${q.desc}
            </div>
        `;
        area.appendChild(qDiv);
    });
}

function selectOption(qIdx, oIdx) {
    userAnswers[qIdx] = oIdx;
    const opts = document.querySelectorAll(`#opt_${qIdx} li`);
    opts.forEach((li, i) => {
        li.style.background = (i === oIdx) ? '#d1e7ff' : '#f9f9f9';
        li.style.borderColor = (i === oIdx) ? '#3498db' : '#eee';
    });
}

function submitQuiz() {

    const name = document.getElementById('student_name').value;
    
    if(!id || !name) {
        alert("학번과 이름을 입력해야 제출할 수 있습니다.");
        return;
    }

    let score = 0;
    let resultLog = `[정보과학 핵심 코드 형성평가 결과]\n`;
    resultLog += `학번: ${id} / 이름: ${name}\n`;
    resultLog += `응시 시각: ${new Date().toLocaleString()}\n`;
    resultLog += `------------------------------------------\n`;

    quizData.forEach((q, i) => {
        const isCorrect = (userAnswers[i] === q.answer);
        if(isCorrect) score += (100 / quizData.length);
        
        resultLog += `문항 ${i + 1}: ${isCorrect ? 'O' : 'X'} (선택: ${userAnswers[i] !== null ? userAnswers[i] + 1 : '미선택'} / 정답: ${q.answer + 1})\n`;
        document.getElementById(`exp_${i}`).style.display = 'block';
    });

    const finalScore = Math.round(score);
    resultLog += `------------------------------------------\n`;
    resultLog += `최종 점수: ${finalScore}점\n`;

    alert(`평가가 완료되었습니다. 점수: ${finalScore}점\n결과 파일이 생성됩니다.`);

    const fileName = `${id}_${name}_${finalScore}_정보과학_응시시각.txt`;
    const blob = new Blob([resultLog], { type: 'text/plain' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = fileName;
    link.click();
}

window.onload = initQuiz;
</script>

</body>
</html>
