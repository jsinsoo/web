<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전국 지역별 인구 항아리</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --primary: #6366f1;
            --male: #3b82f6;
            --female: #f43f5e;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
        }

        /* 사이드바 스타일 */
        .sidebar {
            width: 350px;
            background: var(--card);
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.02);
        }

        .sidebar h2 { font-size: 1.4rem; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
        
        .select-group { margin-bottom: 20px; }
        .label { font-size: 0.8rem; font-weight: 600; color: var(--text-sub); margin-bottom: 8px; display: block; }

        select {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus { border-color: var(--primary); }

        .sgg-container {
            flex: 1;
            overflow-y: auto;
            background: #f8fafc;
            border-radius: 12px;
            padding: 10px;
        }

        .sgg-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .sgg-item {
            padding: 12px 8px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.85rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sgg-item:hover { transform: translateY(-2px); border-color: var(--primary); color: var(--primary); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .sgg-item.active { background: var(--primary); color: white; border-color: var(--primary); font-weight: 600; }

        /* 메인 콘텐츠 스타일 */
        .main-content {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .chart-card {
            background: var(--card);
            width: 100%;
            max-width: 1000px;
            height: 750px;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
        }

        .chart-header { text-align: center; margin-bottom: 30px; }
        .chart-header h3 { font-size: 2rem; margin: 0; letter-spacing: -0.02em; }
        .chart-header .coord-info { font-size: 0.9rem; color: var(--text-sub); margin-top: 8px; }

        .chart-wrapper { flex: 1; position: relative; width: 100%; }

        /* 스크롤바 커스텀 */
        .sgg-container::-webkit-scrollbar { width: 6px; }
        .sgg-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>📍 지역 분석 시스템</h2>
        
        <div class="select-group">
            <span class="label">광역시도 선택</span>
            <select id="sidoSelect" onchange="loadSgg()"></select>
        </div>

        <div class="select-group" style="flex: 1; display: flex; flex-direction: column;">
            <span class="label">시군구 선택</span>
            <div class="sgg-container">
                <div id="sggList" class="sgg-list"></div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="chart-card">
            <div class="chart-header">
                <h3 id="displayTitle">지역을 선택하세요</h3>

            </div>
            <div class="chart-wrapper">
                <canvas id="pyramidChart"></canvas>
            </div>
        </div>
    </div>

        ];

        // 데이터 계층화 (시도 -> 시군구)
        const dataTree = {};
        regions.forEach(r => {
            const parts = r.name.split(' ');
            const sido = parts[0];
            const sgg = parts.slice(1).join(' ') || "전체";
            if(!dataTree[sido]) dataTree[sido] = [];
            dataTree[sido].push({ sgg, ...r });
        });

        const sidoSelect = document.getElementById('sidoSelect');
        const sggList = document.getElementById('sggList');
        let currentChart = null;

        // 초기 로드
        window.onload = () => {
            Object.keys(dataTree).sort().forEach(sido => {
                const opt = document.createElement('option');
                opt.value = sido; opt.textContent = sido;
                sidoSelect.appendChild(opt);
            });
            loadSgg();
        };

        function loadSgg() {
            const sido = sidoSelect.value;
            sggList.innerHTML = '';
            if(!sido) return;

            dataTree[sido].forEach(item => {
                const div = document.createElement('div');
                div.className = 'sgg-item';
                div.textContent = item.sgg;
                div.onclick = () => {
                    document.querySelectorAll('.sgg-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    updateDashboard(item);
                };
                sggList.appendChild(div);
            });
        }

        function updateDashboard(data) {
            document.getElementById('displayTitle').textContent = data.name;
            document.getElementById('displaySub').textContent = 
                `좌표: 위도 ${data.lat}, 경도 ${data.lon} | 기상nx: ${data.nx}, ny: ${data.ny}`;
            
            drawChart(data.name);
        }

        function drawChart(regionName) {
            const labels = ['0-9세', '10-19세', '20-29세', '30-39세', '40-49세', '50-59세', '60-69세', '70-79세', '80세+'];
            
            // 실제 데이터 연동 전 샘플 데이터 로직 (지역별로 조금씩 다르게 생성)
            const seed = regionName.length;
            const maleData = [12, 15, 22, 28, 35, 40, 32, 18, 8].map(v => (v + (seed % 5)) * 100);
            const femaleData = [11, 14, 21, 29, 36, 42, 35, 22, 12].map(v => (v + (seed % 3)) * 100);

            const ctx = document.getElementById('pyramidChart').getContext('2d');
            if(currentChart) currentChart.destroy();

            currentChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '남성 (명)',
                            data: maleData.map(v => -v),
                            backgroundColor: 'rgba(59, 130, 246, 0.85)',
                            hoverBackgroundColor: 'rgba(59, 130, 246, 1)',
                            borderRadius: 5,
                            borderSkipped: false
                        },
                        {
                            label: '여성 (명)',
                            data: femaleData,
                            backgroundColor: 'rgba(244, 63, 94, 0.85)',
                            hoverBackgroundColor: 'rgba(244, 63, 94, 1)',
                            borderRadius: 5,
                            borderSkipped: false
                        }
                    ]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            stacked: true,
                            grid: { color: '#f1f5f9' },
                            ticks: { callback: v => Math.abs(v).toLocaleString() }
                        },
                        y: {
                            stacked: true,
                            grid: { display: false },
                            position: 'center'
                        }
                    },
                    plugins: {
                        legend: { position: 'top', labels: { usePointStyle: true, padding: 20 } },
                        tooltip: {
                            callbacks: {
                                label: (c) => ` ${c.dataset.label.split(' ')[0]}: ${Math.abs(c.raw).toLocaleString()}명`
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
