        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }

        h1 { text-align: center; color: #333; }
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; background: #eee; padding: 15px; border-radius: 8px; }
        select, button { padding: 8px 15px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .btn-clear { background-color: #6c757d; }
        .main-layout { display: grid; grid-template-columns: 1fr 1.5fr 1.5fr; gap: 20px; margin-bottom: 20px; }
        #result_box { background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; font-family: monospace; white-space: pre-wrap; height: 300px; overflow-y: auto; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f8f9fa; font-weight: bold; }
        tr:nth-child(even) { background-color: #f2f2f2; }

</head>

        <button class="btn-clear" onclick="clearHistory()">조회 이력 지우기</button>

    <div class="main-layout">
        <div id="result_box">지역을 선택하고 조회를 눌러주세요.</div>
        <div class="chart-container">

        </div>

    const SERVICE_KEY = "eb995e1b419400d31480385c6b40c859b8ade3502da6cf3823d9b84f1d69c8a6";
    let historyData = [];
    let currentChart, historyChart;

    const sidoSelect = document.getElementById('sido_select');
    Object.keys(REGION_DATA).forEach(sido => {
        const opt = document.createElement('option');
        opt.value = sido;
        opt.innerHTML = sido;
        sidoSelect.appendChild(opt);
    });

    function updateSigungu() {
        const sigunguSelect = document.getElementById('sigungu_select');
        const selectedSido = sidoSelect.value;
        sigunguSelect.innerHTML = '<option value="">시군구 선택</option>';
        if (selectedSido) {
            Object.keys(REGION_DATA[selectedSido]).forEach(sigungu => {
                const opt = document.createElement('option');
                opt.value = sigungu;
                opt.innerHTML = sigungu;
                sigunguSelect.appendChild(opt);
            });
        }
    }

    function getBaseDateTime() {
        const now = new Date();
        // 기상청 데이터 갱신 시간을 고려하여 1시간 전 데이터 조회
        now.setHours(now.getHours() - 1);
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hour = String(now.getHours()).padStart(2, '0');
        return { date: `${year}${month}${day}`, time: `${hour}00` };
    }

    async function fetchWeather() {
        const sido = sidoSelect.value;
        const sigungu = document.getElementById('sigungu_select').value;
        if (!sido || !sigungu) return alert("지역을 선택하세요.");

        const coords = REGION_DATA[sido][sigungu];
        const nx = coords[0];
        const ny = coords[1];
        const { date, time } = getBaseDateTime();
        
        // CORS 프록시를 사용하거나 직접 호출 (공공데이터포털은 보통 직접 호출 허용됨)
        const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtNcst?serviceKey=${SERVICE_KEY}&pageNo=1&numOfRows=1000&dataType=JSON&base_date=${date}&base_time=${time}&nx=${nx}&ny=${ny}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            if (!data.response || data.response.header.resultCode !== "00") {
                throw new Error(data.response ? data.response.header.resultMsg : "데이터를 불러올 수 없습니다.");
            }

            const items = data.response.body.items.item;
            const weatherMap = {};
            items.forEach(i => weatherMap[i.category] = i.obsrValue);

            const result = {
                time: new Date().toLocaleString(),
                region: `${sido} ${sigungu}`,
                temp: parseFloat(weatherMap['T1H'] || 0),
                humi: parseFloat(weatherMap['REH'] || 0),
                rain: parseFloat(weatherMap['RN1'] || 0),
                wind: parseFloat(weatherMap['WSD'] || 0),
                pty: translatePTY(weatherMap['PTY'] || "0")
            };

            historyData.push(result);
            updateUI(result);
        } catch (e) {
            console.error(e);
            alert("조회 실패: " + e.message + "\n(잠시 후 다시 시도하거나 브라우저의 CORS 제한을 확인하세요.)");
        }
    }

    function translatePTY(pty) {
        const map = {"0":"없음", "1":"비", "2":"비/눈", "3":"눈", "5":"빗방울", "6":"빗방울눈날림", "7":"눈날림"};
        return map[pty] || pty;
    }

    function updateUI(res) {
        document.getElementById('result_box').innerText = `[조회 지역] ${res.region}\n[조회 시각] ${res.time}\n\n기온: ${res.temp} ℃\n습도: ${res.humi} %\n강수량: ${res.rain} mm\n풍속: ${res.wind} m/s\n강수형태: ${res.pty}`;

        const tbody = document.querySelector('#history_table tbody');
        const row = `<tr><td>${res.time}</td><td>${res.region}</td><td>${res.temp}</td><td>${res.humi}</td><td>${res.rain}</td><td>${res.wind}</td><td>${res.pty}</td></tr>`;
        tbody.insertAdjacentHTML('afterbegin', row);

        drawCurrentChart(res);
        drawHistoryChart();
    }

    function drawCurrentChart(res) {
        const ctx = document.getElementById('currentChart').getContext('2d');
        if (currentChart) currentChart.destroy();
        currentChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['기온', '습도', '강수량', '풍속'],
                datasets: [{ label: res.region + ' 현재 기상', data: [res.temp, res.humi, res.rain, res.wind], backgroundColor: ['#ff6384', '#36a2eb', '#cc65fe', '#ffce56'] }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function drawHistoryChart() {
        const ctx = document.getElementById('historyChart').getContext('2d');
        if (historyChart) historyChart.destroy();
        const lastData = historyData.slice(-10);
        historyChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: lastData.map(d => d.region),
                datasets: [{ label: '최근 조회 기온(℃)', data: lastData.map(d => d.temp), borderColor: '#4bc0c0', tension: 0.1, fill: false }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function clearHistory() {
        historyData = [];
        document.querySelector('#history_table tbody').innerHTML = "";
        document.getElementById('result_box').innerText = "지역을 선택하고 조회를 눌러주세요.";
        if (currentChart) currentChart.destroy();
        if (historyChart) historyChart.destroy();
    }
