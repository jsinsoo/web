</style></head><body><header><div class="wrap"><b>📘 정보과학 · 평가용 HTML</b><h1>16개 코드: 틀린 설명 찾기 5지선다</h1><p>전체 코드를 읽고, 옳은 설명 4개와 틀린 설명 1개 중 <b>틀린 설명</b>을 고르세요.</p></div></header><main class="wrap"><section class="top"><div class="panel"><div class="grid"><div><b>학번</b><input id="studentId" type="text" placeholder="1101"></div><div><b>이름</b><input id="studentName" type="text" placeholder="홍길동"></div><button class="primary" onclick="gradeQuiz()">제출 및 채점</button><button class="secondary" onclick="downloadTxt()">TXT 저장</button><button class="secondary" onclick="showAnswers()">정답 표시</button></div><div class="bar"><div id="progressBar"></div></div><div id="status">진행률 0/16</div><div id="globalWarn" class="warn"></div></div></section><section id="resultBox" class="result hidden"><h2>채점 결과</h2><div id="scoreBig" class="score"></div><div id="scoreDetail"></div></section><nav class="toc" id="toc"></nav><section id="cards"></section></main><script>
const quizData = [{"title": "활동 1: 게임 플레이어와 남은 게임 수 확인", "code": "def turnA(left):\n    if left == 0:\n        print('게임 종료')\n        return\n    print('A의 턴: 남은 게임 수', left)\n    turnB(left - 1)\n\ndef turnB(left):\n    if left == 0:\n        print('게임 종료')\n        return\n    print('B의 턴: 남은 게임 수', left)\n    turnA(left - 1)\n\ntotal = 6\nturnA(total)", "options": ["left가 0이면 게임 종료를 출력하고 return한다.", "turnA와 turnB가 서로 호출하는 간접 재귀 구조이다.", "호출할 때 left - 1을 전달하므로 남은 게임 수가 줄어든다.", "total = 6이고 turnA(total)로 시작하므로 첫 턴은 A의 턴이다.", "종료 조건이 없어도 파이썬이 자동으로 재귀를 안전하게 멈춘다."], "answer": 4, "optionExplanations": ["맞습니다. 종료 조건입니다.", "맞습니다. 서로 호출합니다.", "맞습니다. 매번 1씩 감소합니다.", "맞습니다. 첫 호출은 turnA입니다.", "틀렸습니다. 종료 조건이 없으면 RecursionError가 발생할 수 있습니다."], "core": "간접 재귀와 종료 조건을 확인하는 코드입니다."}, {"title": "활동 1 응용: n명 플레이어 턴 진행", "code": "def turnGame(left, number):\n    if left == 0:\n        print('game over')\n        return\n    number = number % len(player)\n    print(player[number], '의 턴: 남은 게임 수', left)\n    turnGame(left - 1, number + 1)\n\nplayer = ['A', 'B', 'C', 'D']\nnumber = 0\ntotal = 6\nturnGame(total, number)", "options": ["number % len(player)는 인덱스를 순환시킨다.", "player 길이가 바뀌면 순환 기준도 바뀐다.", "left가 0이 될 때까지 재귀 호출된다.", "number + 1로 다음 플레이어로 이동한다.", "number는 항상 0으로 고정되어 A만 출력된다."], "answer": 4, "optionExplanations": ["맞습니다. 나머지 연산으로 범위를 제한합니다.", "맞습니다. len(player)를 사용합니다.", "맞습니다. left==0이 종료 조건입니다.", "맞습니다. 다음 인덱스로 이동합니다.", "틀렸습니다. number는 증가하고 나머지 연산으로 순환합니다."], "core": "나머지 연산으로 여러 플레이어를 순환시키는 재귀 코드입니다."}, {"title": "활동 2: 단어 퍼즐 게임", "code": "import random\nwords = ['python', 'programming', 'science', 'education', 'computer']\nword = random.choice(words)\nhint = list(word)\nfor i in range(len(hint) // 2):\n    hint[random.randint(0, len(hint) - 1)] = '_'\nprint('힌트:', ''.join(hint))\nfor attempt in range(5):\n    guess = input(f'({attempt + 1}/5) 단어를 추측해 보세요: ')\n    if guess == word:\n        print('정답입니다!')\n        break\n    else:\n        print('틀렸습니다.')\nelse:\n    print(f'실패! 정답은 {word}입니다.')", "options": ["random.choice(words)는 임의의 단어를 고른다.", "list(word)는 문자열을 글자 리스트로 바꾼다.", "''.join(hint)는 리스트를 문자열로 결합한다.", "break가 실행되지 않으면 for-else의 else가 실행된다.", "guess가 word와 달라도 항상 '정답입니다!'가 출력된다."], "answer": 4, "optionExplanations": ["맞습니다.", "맞습니다.", "맞습니다.", "맞습니다.", "틀렸습니다. 정답일 때만 출력됩니다."], "core": "문자열, 리스트, random, for-else를 함께 사용하는 코드입니다."}, {"title": "활동 3: 콜라츠 추측과 우박수열", "code": "def collatz(n):\n    print(n, end=' ')\n    if n == 1:\n        return\n    elif n % 2 == 0:\n        collatz(n // 2)\n    else:\n        collatz(3 * n + 1)\nstart = int(input('자연수를 입력하세요: '))\ncollatz(start)", "options": ["n == 1은 종료 조건이다.", "짝수이면 n // 2로 재귀 호출한다.", "홀수이면 3 * n + 1로 재귀 호출한다.", "end=' '는 한 줄에 이어 출력하게 한다.", "짝수일 때도 항상 3 * n + 1을 계산한다."], "answer": 4, "optionExplanations": ["맞습니다.", "맞습니다.", "맞습니다.", "맞습니다.", "틀렸습니다. 짝수는 n//2입니다."], "core": "콜라츠 규칙을 재귀 함수로 구현한 코드입니다."}, {"title": "활동 3 응용: 우박수열 길이", "code": "def collatz_length(n):\n    if n == 1:\n        return 1\n    elif n % 2 == 0:\n        return 1 + collatz_length(n // 2)\n    else:\n        return 1 + collatz_length(3 * n + 1)\nstart = int(input('자연수를 입력하세요: '))\nprint('우박수열의 길이:', collatz_length(start))", "options": ["n == 1이면 길이 1을 반환한다.", "현재 항을 포함하려고 재귀 결과에 1을 더한다.", "짝수와 홀수에 따라 다음 값이 달라진다.", "print가 아니라 return으로 길이를 계산한다.", "우박수열의 모든 항을 화면에 출력하는 함수이다."], "answer": 4, "optionExplanations": ["맞습니다.", "맞습니다.", "맞습니다.", "맞습니다.", "틀렸습니다. 길이만 반환합니다."], "core": "반환값을 누적하여 재귀적으로 길이를 구합니다."}, {"title": "활동 4: 지도 색칠 문제", "code": "def solve(v, c):\n    for i in range(n):\n        if am[v][i] > 0 and visited[i] == c:\n            return\n    visited[v] = c\n    for i in range(n):\n        if am[v][i] > 0 and visited[i] == 0:\n            solve(i, 1)\n            solve(i, 2)\nn, m, cn = list(map(int, input().split()))\nvisited = [0 for _ in range(n)]\nam = [[0 for _ in range(n)] for _ in range(n)]\nfor i in range(m):\n    v1, v2 = list(map(int, input().split()))\n    am[v1][v2] = am[v2][v1] = 1\nsolve(0, 1)\nprint(visited)", "options": ["am은 인접 행렬이다.", "visited[v]에는 노드 v의 색 번호가 저장된다.", "인접 노드가 같은 색이면 시도를 중단한다.", "am[v][i] > 0이면 두 노드가 인접했다는 뜻이다.", "visited.count(0)이 크면 모든 노드가 색칠되었다는 뜻이다."], "answer": 4, "optionExplanations": ["맞습니다.", "맞습니다.", "맞습니다.", "맞습니다.", "틀렸습니다. 0은 아직 색칠하지 않은 노드입니다."], "core": "그래프를 인접 행렬로 표현하고 색 충돌을 검사합니다."}, {"title": "활동 5: 웹 브라우저 방문 동작", "code": "class Stack:\n    def __init__(self): self.stack = []\n    def isEmpty(self): return len(self.stack) == 0\n    def push(self, data): self.stack.append(data)\n    def pop(self):\n        if not self.isEmpty(): return self.stack.pop()\nclass BrowserHistory:\n    def __init__(self, homepage):\n        self.back_stack = Stack(); self.forward_stack = Stack(); self.current_page = homepage\n    def visit(self, url):\n        self.back_stack.push(self.current_page); self.current_page = url; self.forward_stack = Stack()\n    def go_back(self):\n        if not self.back_stack.isEmpty():\n            self.forward_stack.push(self.current_page); self.current_page = self.back_stack.pop()\n    def go_forward(self):\n        if not self.forward_stack.isEmpty():\n            self.back_stack.push(self.current_page); self.current_page = self.forward_stack.pop()", "options": ["visit은 현재 페이지를 back_stack에 저장한다.", "새 페이지 방문 뒤 forward_stack은 초기화된다.", "go_back은 현재 페이지를 forward_stack에 넣는다.", "pop은 리스트의 마지막 원소를 꺼낸다.", "스택은 먼저 들어간 데이터가 먼저 나오는 FIFO 구조이다."], "answer": 4, "optionExplanations": ["맞습니다.", "맞습니다.", "맞습니다.", "맞습니다.", "틀렸습니다. 스택은 LIFO 구조입니다."], "core": "브라우저 뒤로/앞으로 가기를 두 개의 스택으로 관리합니다."}, {"title": "정답: 플레이리스트 함수", "code": "playlist = []\nplaylist_name = 'My Playlist'\ndef add_song(song): playlist.append(song)\ndef remove_song(song):\n    if song in playlist: playlist.remove(song)\ndef reset_playlist():\n    global playlist\n    playlist = []\ndef show_playlist():\n    if not playlist: print('비어 있습니다.')\n    else:\n        for index, song in enumerate(playlist, 1): print(index, song)\ndef print_song_count(): print(len(playlist))", "options": ["add_song은 append로 노래를 추가한다.", "remove_song은 in으로 존재 여부를 확인할 수 있다.", "reset_playlist는 전역 playlist를 다시 대입하므로 global을 사용한다.", "enumerate(playlist, 1)은 번호를 1부터 붙인다.", "print_song_count는 playlist_name의 글자 수를 출력한다."], "answer": 4, "optionExplanations": ["맞습니다.", "맞습니다.", "맞습니다.", "맞습니다.", "틀렸습니다. playlist의 곡 수를 출력합니다."], "core": "함수로 플레이리스트 기능을 분리한 코드입니다."}, {"title": "정답: 가위바위보 게임", "code": "import random\nscore = 0\ndef get_user_input(): return input('가위, 바위, 보: ').strip()\ndef get_computer_input(): return random.choice(['가위','바위','보'])\ndef print_result(user, comp):\n    global score\n    if user == comp: score = 50\n    elif (user=='가위' and comp=='보') or (user=='바위' and comp=='가위') or (user=='보' and comp=='바위'):\n        score = 100\n    else: score = 0\ndef play_game(): print_result(get_user_input(), get_computer_input())", "options": ["strip은 입력 앞뒤 공백을 제거한다.", "random.choice는 컴퓨터 선택을 무작위로 만든다.", "global score는 함수 안에서 전역 score를 바꾸기 위해 사용한다.", "승패에 따라 score는 0, 50, 100 중 하나가 된다.", "사용자와 컴퓨터의 선택이 같으면 score는 100이다."], "answer": 4, "optionExplanations": ["맞습니다.", "맞습니다.", "맞습니다.", "맞습니다.", "틀렸습니다. 같으면 50점입니다."], "core": "입력, 무작위 선택, 승패 판정을 함수로 나눈 코드입니다."}, {"title": "정답: 터틀 다각형 그리기", "code": "from turtle import Turtle, Screen\nfrom random import random\ndef move_turtle(t, distance):\n    t.penup(); t.forward(distance); t.pendown()\ndef draw_shape(t, sides, size):\n    t.color((random(), random(), random()))\n    angle = 360 / sides\n    for _ in range(sides):\n        t.forward(size); t.left(angle)\n    move_turtle(t, size * 1.5)\nt = Turtle(); draw_shape(t, 3, 120); draw_shape(t, 4, 100); draw_shape(t, 5, 80)", "options": ["angle은 360 / sides로 계산한다.", "for문은 sides번 반복한다.", "move_turtle은 펜을 올리고 이동한 뒤 다시 내린다.", "draw_shape(t, 3, 120)은 삼각형을 그린다.", "sides가 커져도 반복 횟수는 항상 1번이다."], "answer": 4, "optionExplanations": ["맞습니다.", "맞습니다.", "맞습니다.", "맞습니다.", "틀렸습니다. sides 값만큼 반복합니다."], "core": "변의 수와 크기를 매개변수로 받아 정다각형을 그립니다."}, {"title": "정답: 프랙털 트리 재귀", "code": "import turtle\ndef draw_tree(length, depth):\n    if depth == 0: return\n    turtle.forward(length)\n    turtle.left(45); draw_tree(length / 2, depth - 1)\n    turtle.right(90); draw_tree(length / 2, depth - 1)\n    turtle.left(45); turtle.backward(length)\nturtle.left(90); draw_tree(100, 5); turtle.done()", "options": ["depth가 0이면 함수가 종료된다.", "재귀 호출마다 length는 절반으로 줄어든다.", "depth는 1씩 감소한다.", "backward는 원래 위치로 돌아가는 데 사용된다.", "이 코드는 재귀 호출을 전혀 사용하지 않는다."], "answer": 4, "optionExplanations": ["맞습니다.", "맞습니다.", "맞습니다.", "맞습니다.", "틀렸습니다. draw_tree가 자기 자신을 호출합니다."], "core": "프랙털 구조를 재귀로 그리는 코드입니다."}, {"title": "정답: 디렉터리 파일 찾기", "code": "import os\ndef find_item(root_path, target):\n    for item in os.listdir(root_path):\n        item_path = os.path.join(root_path, item)\n        if os.path.isdir(item_path):\n            result = find_item(item_path, target)\n            if result: return result\n        elif item == target:\n            return item_path\n    return None", "options": ["os.listdir은 현재 경로의 항목 목록을 가져온다.", "os.path.join은 경로를 안전하게 합친다.", "폴더이면 find_item을 재귀 호출한다.", "target과 같은 파일을 찾으면 경로를 반환한다.", "파일을 찾지 못해도 항상 임의의 경로를 반환한다."], "answer": 4, "optionExplanations": ["맞습니다.", "맞습니다.", "맞습니다.", "맞습니다.", "틀렸습니다. 못 찾으면 None을 반환합니다."], "core": "하위 폴더까지 재귀적으로 탐색해 파일을 찾습니다."}, {"title": "정답: 괄호 검사 Stack", "code": "class Stack:\n    def __init__(self): self.stack = []\n    def isEmpty(self): return len(self.stack) == 0\n    def push(self, data): self.stack.append(data)\n    def pop(self):\n        if not self.isEmpty(): return self.stack.pop()\ndef check(string):\n    s = Stack()\n    for ch in string:\n        if ch in '{[(': s.push(ch)\n        elif ch in '}])':\n            if s.isEmpty(): return False\n            left = s.pop()\n            if (ch == '}' and left != '{') or (ch == ']' and left != '[') or (ch == ')' and left != '('): return False\n    return s.isEmpty()", "options": ["여는 괄호는 push한다.", "닫는 괄호는 pop하여 짝을 확인한다.", "스택이 비었는데 닫는 괄호가 나오면 False이다.", "검사 후 스택이 비어 있으면 올바른 괄호이다.", "닫는 괄호가 먼저 나와도 True를 반환한다."], "answer": 4, "optionExplanations": ["맞습니다.", "맞습니다.", "맞습니다.", "맞습니다.", "틀렸습니다. 닫는 괄호가 먼저 나오면 False입니다."], "core": "괄호 짝 검사는 LIFO 구조인 스택을 활용합니다."}, {"title": "정답: N-Queen", "code": "def is_safe(board, row, col):\n    for i in range(row):\n        if board[i] == col: return False\n    for i in range(row):\n        if abs(board[i] - col) == abs(i - row): return False\n    return True\ndef solve_n_queens(n, row=0, board=[]):\n    if row == n: return True\n    for col in range(n):\n        if is_safe(board, row, col):\n            board.append(col)\n            if solve_n_queens(n, row + 1, board): return True\n            board.pop()\n    return False", "options": ["is_safe는 같은 열 충돌을 검사한다.", "대각선 충돌은 행 차이와 열 차이의 절댓값으로 판단한다.", "안전한 위치면 board에 열 번호를 추가한다.", "실패하면 board.pop으로 되돌린다.", "조건 검사 없이 아무 칸에나 퀸을 놓으면 해결된다."], "answer": 4, "optionExplanations": ["맞습니다.", "맞습니다.", "맞습니다.", "맞습니다.", "틀렸습니다. 열과 대각선 충돌 검사가 필요합니다."], "core": "백트래킹으로 퀸의 위치를 하나씩 선택하고 되돌립니다."}, {"title": "정답: 동적 계획법 동전 최소 개수", "code": "k = int(input())\ndt = [0 for _ in range(k + 1)]\ndt[1] = dt[3] = dt[4] = 1\ndef f(n):\n    if n < 1: return 0\n    if dt[n] > 0: return dt[n]\n    dt[n] = min(f(n - 1), f(n - 3), f(n - 4)) + 1\n    return dt[n]\nprint(f(k))", "options": ["dt는 계산 결과를 저장하는 테이블이다.", "dt[1], dt[3], dt[4]는 기본값이다.", "f(n)은 가능한 이전 상태의 최솟값에 1을 더한다.", "dt[n] > 0이면 저장된 값을 재사용한다.", "min 함수는 세 값 중 가장 큰 값을 반환한다."], "answer": 4, "optionExplanations": ["맞습니다.", "맞습니다.", "맞습니다.", "맞습니다.", "틀렸습니다. min은 최솟값을 반환합니다."], "core": "메모이제이션으로 최소 동전 개수를 구합니다."}, {"title": "정답: 1 만들기 연산", "code": "def min_operations_to_one(N, K):\n    count = 0\n    while N > 1:\n        if N % K == 0:\n            N //= K\n        else:\n            N -= 1\n        count += 1\n    return count\nprint(min_operations_to_one(17, 4))", "options": ["while N > 1인 동안 반복한다.", "N이 K로 나누어떨어지면 N //= K를 수행한다.", "나누어떨어지지 않으면 N -= 1을 수행한다.", "각 연산마다 count가 1 증가한다.", "count는 항상 0으로 let submitted=false,lastResult=null;const startTime=new Date();
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function circ(i){return String.fromCharCode(9312+i)}
function render(){document.getElementById('toc').innerHTML=quizData.map((q,i)=>`<a href="#q${i+1}">${String(i+1).padStart(2,'0')}. ${esc(q.title)}</a>`).join('');document.getElementById('cards').innerHTML=quizData.map((q,i)=>{let opts=q.options.map((op,j)=>`<label class="option" id="opt-${i}-${j}"><input type="radio" name="q${i}" value="${j}" onchange="updateProgress()"> <b>${circ(j)}</b> ${esc(op)}</label>`).join('');return `<article class="card" id="q${i+1}"><div class="head"><div class="num">${String(i+1).padStart(2,'0')}</div><div><h2>${esc(q.title)}</h2><p>틀린 설명 1개를 고르세요.</p></div></div><button class="secondary" onclick="copyCode(${i})">코드 복사</button><pre><code>${esc(q.code)}</code></pre><h3>문제</h3><div>${opts}</div><div class="feedback" id="fb-${i}"></div></article>`}).join('');updateProgress();}
function selectedOf(i){let e=document.querySelector(`input[name="q${i}"]:checked`);return e?Number(e.value):null;}
function updateProgress(){let done=quizData.filter((_,i)=>selectedOf(i)!==null).length;document.getElementById('status').textContent=`진행률 ${done}/${quizData.length} · 남은 문제 ${quizData.length-done}개`;document.getElementById('progressBar').style.width=(done/quizData.length*100)+'%';}
function fmt(d){let z=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())} ${z(d.getHours())}:${z(d.getMinutes())}:${z(d.getSeconds())}`;}
function fdate(d){let z=n=>String(n).padStart(2,'0');return `${d.getFullYear()}${z(d.getMonth()+1)}${z(d.getDate())}_${z(d.getHours())}${z(d.getMinutes())}${z(d.getSeconds())}`;}
function gradeQuiz(){let sid=document.getElementById('studentId').value.trim(),name=document.getElementById('studentName').value.trim(),warn=document.getElementById('globalWarn');warn.textContent='';if(!sid||!name){warn.textContent='학번과 이름을 입력해 주세요.';return;}let miss=[];quizData.forEach((q,i)=>{if(selectedOf(i)===null)miss.push(i+1)});if(miss.length){warn.textContent='미완료 문항: '+miss.join(', ');return;}let correct=0,details=[];quizData.forEach((q,i)=>{let sel=selectedOf(i),ok=sel===q.answer;if(ok)correct++;q.options.forEach((op,j)=>{let el=document.getElementById(`opt-${i}-${j}`);el.style.borderColor='#dbe7f6';el.style.background='#fbfdff';if(j===q.answer){el.style.borderColor='#fca5a5';el.style.background='#fff1f2';}if(j===sel&&j!==q.answer){el.style.borderColor='#86efac';el.style.background='#f0fdf4';}});let fb=document.getElementById(`fb-${i}`);fb.style.display='block';fb.className='feedback '+(ok?'good':'bad');fb.innerHTML=`<b>${ok?'정답입니다.':'오답입니다.'}</b><br>선택: ${circ(sel)} / 정답(틀린 설명): ${circ(q.answer)}`+q.optionExplanations.map((e,j)=>`<div class="ex"><b>${circ(j)} ${j===q.answer?'틀린 설명':'옳은 설명'}</b><br>${esc(e)}</div>`).join('')+`<div class="ex"><b>코드 핵심</b><br>${esc(q.core)}</div>`;details.push({num:i+1,title:q.title,selected:sel,answer:q.answer,correct:ok});});let score=Math.round(correct/quizData.length*100),end=new Date();lastResult={sid,name,score,correct,total:quizData.length,startTime,endTime:end,details};submitted=true;document.getElementById('resultBox').classList.remove('hidden');document.getElementById('scoreBig').textContent=score+'점';document.getElementById('scoreDetail').textContent=`${sid} ${name} · 정답 ${correct}/${quizData.length} · 제출시각 ${fmt(end)}`;document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});}
function showAnswers(){quizData.forEach((q,i)=>{let e=document.querySelector(`input[name="q${i}"][value="${q.answer}"]`);if(e)e.checked=true;});updateProgress();}
function makeTxt(){let lines=['정보과학 16개 코드 틀린 설명 찾기 평가 결과','='.repeat(50),`학번: ${lastResult.sid}`,`이름: ${lastResult.name}`,`점수: ${lastResult.score}점`,`정답: ${lastResult.correct}/${lastResult.total}`,`응시 시작: ${fmt(lastResult.startTime)}`,`응시 종료: ${fmt(lastResult.endTime)}`,''];quizData.forEach((q,i)=>{let d=lastResult.details[i];lines.push(`[${String(i+1).padStart(2,'0')}] ${q.title}`);lines.push(`정오답: ${d.correct?'정답':'오답'}`);lines.push(`선택: ${circ(d.selected)} / 정답: ${circ(d.answer)}`);q.options.forEach((op,j)=>{lines.push(`${circ(j)} ${op}`);lines.push('해설: '+q.optionExplanations[j]);});lines.push('코드 핵심: '+q.core);lines.push('-'.repeat(50));});return lines.join('\\n');}
function downloadTxt(){if(!submitted){alert('먼저 제출 및 채점을 해 주세요.');return;}let blob=new Blob([makeTxt()],{type:'text/plain;charset=utf-8'}),a=document.createElement('a');let ss=lastResult.sid.replace(/[\/:*?"<>|\s]/g,'_'),nn=lastResult.name.replace(/[\/:*?"<>|\s]/g,'_');a.href=URL.createObjectURL(blob);a.download=`${ss}_${nn}_${lastResult.score}점_정보과학_${fdate(lastResult.endTime)}.txt`;a.click();URL.revokeObjectURL(a.href);}
function copyCode(i){navigator.clipboard.writeText(quizData[i].code).then(()=>alert('코드가 복사되었습니다.'));}
render();
